<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, user-scalable=no">
<style>
* { touch-action: manipulation; -webkit-touch-callout: none; -webkit-user-select: none; }
html, body { width: 1920px; height: 1080px; background: #0A1628; color: #fff; font-family: sans-serif; margin: 0; }
#startBtn { position: absolute; top: 0; left: 0; width: 1920px; height: 1080px; background: #000; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 100; font-size: 48px; }
#status { position: absolute; top: 400px; left: 0; width: 1920px; text-align: center; font-size: 72px; z-index: 50; }
</style>
</head><body>
<div id="status">Waiting...</div>
<div id="startBtn" onclick="
  document.getElementById('startBtn').style.display='none';
  document.getElementById('status').textContent='PLAYING - TAP ANYWHERE';
  document.addEventListener('touchstart', function(e){
    e.preventDefault();
    document.getElementById('status').textContent='PAUSED '+Date.now();
  });
  document.addEventListener('click', function(){
    document.getElementById('status').textContent='CLICKED '+Date.now();
  });
">
  ▶ TAP TO START
</div>
</body></html>
