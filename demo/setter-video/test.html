<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<style>
html, body { width: 1920px; height: 1080px; background: #0A1628; color: #fff; font-family: sans-serif; margin: 0; }
#startBtn { position: absolute; top: 0; left: 0; width: 1920px; height: 1080px; background: #000; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 100; font-size: 48px; }
#pauseBtn { position: absolute; top: 0; left: 0; width: 1920px; height: 1080px; background: transparent; cursor: pointer; z-index: 100; display: none; }
#status { position: absolute; top: 400px; left: 0; width: 1920px; text-align: center; font-size: 72px; z-index: 50; }
</style>
</head><body>
<div id="status">Waiting...</div>
<div id="startBtn" onclick="document.getElementById('startBtn').style.display='none'; document.getElementById('pauseBtn').style.display='block'; document.getElementById('status').textContent='PLAYING - TAP TO PAUSE';">
  ▶ TAP TO START
</div>
<div id="pauseBtn" onclick="document.getElementById('status').textContent='PAUSED '+Date.now();">
</div>
</body></html>
