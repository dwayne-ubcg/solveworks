<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script>
// Referral redirect: solveworks.io/r/drew → solveworks.io/audit/?ref=drew
(function() {
    var path = window.location.pathname.replace(/\/+$/, '');
    var parts = path.split('/');
    // Get the segment after /r/
    var ref = parts[parts.length - 1];
    if (ref && ref !== 'r') {
        window.location.replace('/audit/?ref=' + encodeURIComponent(ref.toLowerCase()));
    } else {
        // No ref name — just go to audit
        window.location.replace('/audit/');
    }
})();
</script>
</head>
<body></body>
</html>
