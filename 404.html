<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script>
// Handle /r/<partner> referral redirects on GitHub Pages
(function() {
    var path = window.location.pathname.replace(/\/+$/, '');
    if (path.indexOf('/r/') === 0) {
        var ref = path.split('/')[2];
        if (ref) {
            window.location.replace('/audit/?ref=' + encodeURIComponent(ref.toLowerCase()));
            return;
        }
    }
    // Not a referral URL — show 404
    document.addEventListener('DOMContentLoaded', function() {
        document.getElementById('content').style.display = 'block';
    });
})();
</script>
<title>Page Not Found | SolveWorks</title>
<style>
body { background: #0A1628; color: #e2e8f0; font-family: Inter, system-ui, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
.container { text-align: center; display: none; }
h1 { font-size: 3rem; margin-bottom: 0.5rem; }
p { color: #94a3b8; font-size: 1.1rem; }
a { color: #0ea5e9; text-decoration: none; }
a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div id="content" class="container">
<h1>404</h1>
<p>This page doesn't exist.</p>
<p><a href="/">← Back to SolveWorks</a></p>
</div>
</body>
</html>
