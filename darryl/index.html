<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="refresh" content="300">
<title>Brit | Darryl's Mission Control</title>
<style>
  :root {
    --bg: #0a0e17;
    --panel: #111827;
    --border: #1f2937;
    --accent: #3b82f6;
    --accent2: #10b981;
    --accent3: #f59e0b;
    --accent4: #8b5cf6;
    --text: #e5e7eb;
    --muted: #6b7280;
    --danger: #ef4444;
    --success: #10b981;
    --warning: #f59e0b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    padding: 24px;
  }
  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  header h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.5px; }
  header h1 span { color: var(--accent); }
  header .meta { font-size: 0.75rem; color: var(--muted); }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
    gap: 20px;
  }
  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    position: relative;
    overflow: hidden;
  }
  .panel.wide { grid-column: span 2; }
  .panel.full-width { grid-column: 1 / -1; }
  .panel-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }
  .panel-title {
    font-size: 0.8rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
  }
  .panel-badge {
    font-size: 0.65rem;
    padding: 2px 8px;
    border-radius: 999px;
    font-weight: 600;
  }
  .badge-blue { background: rgba(59,130,246,0.15); color: #60a5fa; }
  .badge-green { background: rgba(16,185,129,0.15); color: #34d399; }
  .badge-yellow { background: rgba(245,158,11,0.15); color: #fbbf24; }
  .badge-purple { background: rgba(139,92,246,0.15); color: #a78bfa; }
  .badge-red { background: rgba(239,68,68,0.15); color: #f87171; }
  .badge-gray { background: rgba(107,114,128,0.15); color: #9ca3af; }
  .badge-cyan { background: rgba(6,182,212,0.15); color: #22d3ee; }

  /* ─── ONE THING PANEL ──────────────────────────────────────────── */
  .one-thing-panel {
    background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
    border: 1px solid rgba(99,102,241,0.4);
    border-radius: 16px;
    padding: 28px 32px;
    position: relative;
    overflow: hidden;
    grid-column: 1 / -1;
  }
  .one-thing-panel::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: radial-gradient(ellipse at 20% 50%, rgba(99,102,241,0.08) 0%, transparent 70%),
                radial-gradient(ellipse at 80% 50%, rgba(59,130,246,0.06) 0%, transparent 70%);
    pointer-events: none;
  }
  .one-thing-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .one-thing-label {
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #818cf8;
  }
  .one-thing-time {
    font-size: 0.7rem;
    color: var(--muted);
  }
  .one-thing-insight {
    font-size: 1.6rem;
    font-weight: 700;
    line-height: 1.3;
    color: #f1f5f9;
    margin-bottom: 20px;
    max-width: 85%;
    letter-spacing: -0.5px;
  }
  .one-thing-cards {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 16px;
  }
  .one-thing-card {
    padding: 14px 16px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.06);
    background: rgba(255,255,255,0.03);
  }
  .one-thing-card-label {
    font-size: 0.65rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 6px;
  }
  .one-thing-card-label.why { color: #60a5fa; }
  .one-thing-card-label.action { color: #34d399; }
  .one-thing-card-text { font-size: 0.85rem; color: #cbd5e1; line-height: 1.5; }
  .one-thing-empty {
    text-align: center;
    padding: 20px;
  }
  .one-thing-empty .big-text {
    font-size: 1.2rem;
    font-weight: 600;
    color: #818cf8;
    margin-bottom: 8px;
  }
  .one-thing-empty p { font-size: 0.85rem; color: var(--muted); }

  /* ─── ANOMALY PANEL ────────────────────────────────────────────── */
  .anomaly-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid rgba(239,68,68,0.2);
    background: rgba(239,68,68,0.05);
    margin-bottom: 8px;
  }
  .anomaly-item:last-child { margin-bottom: 0; }
  .anomaly-icon { font-size: 1.2rem; flex-shrink: 0; }
  .anomaly-content { flex: 1; min-width: 0; }
  .anomaly-title { font-size: 0.85rem; font-weight: 600; margin-bottom: 3px; }
  .anomaly-detail { font-size: 0.75rem; color: var(--muted); }
  .anomaly-dismiss {
    background: rgba(239,68,68,0.15);
    border: 1px solid rgba(239,68,68,0.25);
    color: #f87171;
    font-size: 0.65rem;
    padding: 3px 8px;
    border-radius: 4px;
    cursor: pointer;
    flex-shrink: 0;
    transition: background 0.15s;
  }
  .anomaly-dismiss:hover { background: rgba(239,68,68,0.25); }
  .anomaly-empty {
    text-align: center; padding: 20px; color: var(--muted);
  }
  .anomaly-updated { font-size: 0.7rem; color: var(--muted); margin-top: 8px; text-align: right; }

  /* ─── MEETING ROI PANEL ─────────────────────────────────────────── */
  .roi-summary {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 14px 16px;
    background: rgba(59,130,246,0.08);
    border: 1px solid rgba(59,130,246,0.2);
    border-radius: 10px;
    margin-bottom: 16px;
  }
  .roi-score-big {
    font-size: 2.2rem;
    font-weight: 800;
    line-height: 1;
    color: var(--accent);
  }
  .roi-score-big.high { color: var(--success); }
  .roi-score-big.medium { color: var(--warning); }
  .roi-score-big.low { color: var(--danger); }
  .roi-summary-text { font-size: 0.8rem; color: var(--muted); }
  .roi-summary-label { font-weight: 600; color: var(--text); font-size: 0.9rem; margin-bottom: 2px; }
  .roi-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .roi-item:last-child { border-bottom: none; }
  .roi-bar-wrap { flex: 1; }
  .roi-meeting-name { font-size: 0.8rem; font-weight: 500; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .roi-meeting-date { font-size: 0.68rem; color: var(--muted); }
  .roi-bar { height: 4px; background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden; width: 80px; flex-shrink: 0; }
  .roi-bar-fill { height: 100%; border-radius: 2px; transition: width 0.4s; }
  .roi-score-num { font-size: 0.85rem; font-weight: 700; width: 24px; text-align: right; flex-shrink: 0; }

  /* ─── TIME TO GOAL PANEL ─────────────────────────────────────────── */
  .goal-item {
    padding: 14px;
    border-radius: 10px;
    border: 1px solid var(--border);
    margin-bottom: 10px;
    background: rgba(255,255,255,0.02);
  }
  .goal-item:last-child { margin-bottom: 0; }
  .goal-name { font-size: 0.9rem; font-weight: 600; margin-bottom: 4px; }
  .goal-values {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .goal-current { font-size: 1.1rem; font-weight: 700; color: var(--accent); }
  .goal-arrow { color: var(--muted); font-size: 0.8rem; }
  .goal-target { font-size: 0.85rem; color: var(--muted); }
  .goal-progress-bar { height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; margin-bottom: 6px; }
  .goal-progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent2), var(--accent)); border-radius: 3px; transition: width 0.5s ease; }
  .goal-projection { font-size: 0.72rem; color: var(--muted); display: flex; justify-content: space-between; }
  .goal-proj-date { color: var(--accent3); font-weight: 600; }
  .goals-empty {
    text-align: center; padding: 28px 16px; color: var(--muted);
  }
  .goals-empty .icon { font-size: 2.5rem; margin-bottom: 12px; }
  .goals-empty .headline { font-size: 0.95rem; font-weight: 600; color: var(--text); margin-bottom: 6px; }
  .goals-empty p { font-size: 0.8rem; line-height: 1.5; }
  .goals-empty .cta {
    display: inline-block;
    margin-top: 14px;
    padding: 8px 16px;
    background: rgba(245,158,11,0.1);
    border: 1px solid rgba(245,158,11,0.3);
    border-radius: 8px;
    font-size: 0.78rem;
    color: var(--warning);
    font-weight: 600;
  }

  /* ─── COMPETITOR INTEL PANEL ─────────────────────────────────────── */
  .intel-item {
    padding: 10px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .intel-item:last-child { border-bottom: none; }
  .intel-item-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 4px;
  }
  .intel-relevance {
    font-size: 0.6rem;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .rel-high { background: rgba(239,68,68,0.15); color: #f87171; }
  .rel-medium { background: rgba(245,158,11,0.15); color: #fbbf24; }
  .rel-low { background: rgba(107,114,128,0.15); color: #9ca3af; }
  .intel-date { font-size: 0.68rem; color: var(--muted); }
  .intel-text { font-size: 0.8rem; line-height: 1.45; color: var(--text); }
  .intel-source { font-size: 0.68rem; color: var(--muted); margin-top: 3px; }
  .intel-empty {
    text-align: center; padding: 24px 16px; color: var(--muted);
  }
  .intel-updated { font-size: 0.7rem; color: var(--muted); margin-top: 10px; text-align: right; border-top: 1px solid rgba(255,255,255,0.04); padding-top: 8px; }

  /* ─── MOMENTUM PANEL ─────────────────────────────────────────────── */
  .momentum-gauge {
    position: relative;
    width: 140px;
    height: 80px;
    margin: 0 auto 20px;
    overflow: hidden;
  }
  .momentum-arc-bg {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 140px;
    border-radius: 70px 70px 0 0;
    border: 12px solid rgba(255,255,255,0.06);
    border-bottom: none;
  }
  .momentum-arc-fill {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 140px;
    border-radius: 70px 70px 0 0;
    border-bottom: none;
    transform-origin: bottom center;
    transition: transform 0.6s ease;
  }
  .momentum-score-display {
    text-align: center;
    margin-bottom: 20px;
  }
  .momentum-score-num {
    font-size: 3rem;
    font-weight: 800;
    line-height: 1;
  }
  .momentum-score-label {
    font-size: 0.72rem;
    color: var(--muted);
    margin-top: 4px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .momentum-history {
    display: flex;
    gap: 8px;
    align-items: flex-end;
    justify-content: center;
    height: 48px;
    margin-top: 8px;
  }
  .momentum-bar-wrap { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .momentum-bar {
    width: 32px;
    background: rgba(255,255,255,0.1);
    border-radius: 3px;
    transition: height 0.4s;
    min-height: 4px;
  }
  .momentum-bar.current { background: var(--accent); }
  .momentum-bar-week { font-size: 0.6rem; color: var(--muted); }
  .momentum-empty {
    text-align: center; padding: 20px; color: var(--muted);
  }
  .momentum-empty .icon { font-size: 2rem; margin-bottom: 8px; }

  /* ─── EXISTING PANEL STYLES ──────────────────────────────────────── */
  .security-status {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    border-radius: 8px;
    margin-bottom: 12px;
  }
  .security-ok { background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.2); }
  .security-warn { background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.2); }
  .status-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .dot-green { background: var(--success); box-shadow: 0 0 8px var(--success); animation: pulse 2s infinite; }
  .dot-yellow { background: var(--warning); box-shadow: 0 0 8px var(--warning); }
  @keyframes pulse {
    0%, 100% { opacity: 1; } 50% { opacity: 0.5; }
  }
  .security-detail { font-size: 0.75rem; color: var(--muted); }
  .security-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .security-item {
    display: flex; align-items: center; gap: 6px;
    font-size: 0.75rem; padding: 6px 8px;
    background: rgba(255,255,255,0.03); border-radius: 6px;
  }
  .task-item {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 10px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .task-item:last-child { border-bottom: none; }
  .task-priority {
    width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; margin-top: 6px;
  }
  .pri-high { background: var(--danger); }
  .pri-medium { background: var(--warning); }
  .pri-low { background: var(--accent2); }
  .task-content { flex: 1; min-width: 0; }
  .task-title { font-size: 0.85rem; font-weight: 500; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .task-meta { font-size: 0.7rem; color: var(--muted); }
  .task-status {
    font-size: 0.65rem; padding: 2px 6px; border-radius: 4px; white-space: nowrap; flex-shrink: 0;
  }
  .status-todo { background: rgba(107,114,128,0.2); color: #9ca3af; }
  .status-in-progress { background: rgba(59,130,246,0.2); color: #60a5fa; }
  .status-done { background: rgba(16,185,129,0.2); color: #34d399; }
  .status-blocked { background: rgba(239,68,68,0.2); color: #f87171; }
  .activity-item {
    display: flex; gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    font-size: 0.8rem;
  }
  .activity-item:last-child { border-bottom: none; }
  .activity-type {
    font-size: 0.65rem; padding: 2px 6px; border-radius: 4px;
    white-space: nowrap; flex-shrink: 0; height: fit-content; margin-top: 1px;
  }
  .type-task { background: rgba(59,130,246,0.2); color: #60a5fa; }
  .type-intel { background: rgba(139,92,246,0.2); color: #a78bfa; }
  .type-alert { background: rgba(239,68,68,0.2); color: #f87171; }
  .type-research { background: rgba(245,158,11,0.2); color: #fbbf24; }
  .activity-content { flex: 1; }
  .activity-title { font-weight: 500; margin-bottom: 2px; }
  .activity-time { font-size: 0.7rem; color: var(--muted); }
  .meeting-item {
    padding: 10px 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    margin-bottom: 8px;
    background: rgba(255,255,255,0.02);
  }
  .meeting-time { font-size: 0.7rem; color: var(--accent); margin-bottom: 4px; font-weight: 600; }
  .meeting-title { font-size: 0.85rem; font-weight: 500; margin-bottom: 4px; }
  .meeting-attendees { font-size: 0.7rem; color: var(--muted); }
  .learning-header {
    background: linear-gradient(135deg, rgba(139,92,246,0.15), rgba(59,130,246,0.1));
    border: 1px solid rgba(139,92,246,0.2);
    border-radius: 8px;
    padding: 12px;
    margin-bottom: 12px;
  }
  .learning-topic { font-size: 0.9rem; font-weight: 600; margin-bottom: 4px; }
  .learning-progress { font-size: 0.75rem; color: var(--muted); margin-bottom: 8px; }
  .learning-bar { height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; }
  .learning-fill { height: 100%; background: linear-gradient(90deg, #8b5cf6, #3b82f6); border-radius: 3px; }
  .lesson-item {
    display: flex; gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    font-size: 0.8rem;
  }
  .lesson-item:last-child { border-bottom: none; }
  .lesson-num { color: var(--muted); font-size: 0.7rem; flex-shrink: 0; width: 50px; padding-top: 1px; }
  .lesson-title { flex: 1; font-weight: 500; }
  .lesson-date { font-size: 0.7rem; color: var(--muted); white-space: nowrap; }
  .lesson-today { background: rgba(139,92,246,0.1); border-radius: 6px; padding: 8px 10px; border: 1px solid rgba(139,92,246,0.2); }
  .learning-empty { text-align: center; padding: 32px 16px; color: var(--muted); }
  .overnight-header {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 12px;
    background: rgba(245,158,11,0.08);
    border: 1px solid rgba(245,158,11,0.15);
    border-radius: 8px;
    margin-bottom: 12px;
    font-size: 0.8rem;
  }
  .overnight-task-item {
    padding: 10px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .overnight-task-item:last-child { border-bottom: none; }
  .overnight-task-title { font-size: 0.85rem; font-weight: 600; margin-bottom: 3px; }
  .overnight-task-summary { font-size: 0.75rem; color: var(--muted); }
  .overnight-empty { text-align: center; padding: 32px 16px; color: var(--muted); }
  .trip-item {
    padding: 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: rgba(255,255,255,0.02);
    margin-bottom: 8px;
  }
  .trip-dest { font-size: 1rem; font-weight: 600; margin-bottom: 4px; }
  .trip-dates { font-size: 0.75rem; color: var(--muted); }
  .doc-item {
    display: flex; gap: 10px; align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .doc-item:last-child { border-bottom: none; }
  .doc-type {
    font-size: 0.65rem; padding: 2px 6px; border-radius: 4px;
    white-space: nowrap; background: rgba(255,255,255,0.08); color: var(--muted);
  }
  .doc-name { font-size: 0.82rem; font-weight: 500; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .doc-date { font-size: 0.7rem; color: var(--muted); white-space: nowrap; }
  .health-metric {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .health-metric:last-child { border-bottom: none; }
  .health-label { font-size: 0.8rem; color: var(--muted); }
  .health-value { font-size: 1rem; font-weight: 600; }
  .call-item {
    padding: 10px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .call-item:last-child { border-bottom: none; }
  .call-contact { font-size: 0.85rem; font-weight: 600; margin-bottom: 2px; }
  .call-meta { font-size: 0.7rem; color: var(--muted); margin-bottom: 6px; }
  .call-takeaway { font-size: 0.75rem; color: var(--text); padding: 4px 8px; background: rgba(255,255,255,0.03); border-radius: 4px; margin-bottom: 3px; }
  .empty { text-align: center; padding: 24px; color: var(--muted); font-size: 0.8rem; }
  .panel-error {
    color: var(--danger); font-size: 0.75rem;
    padding: 8px 12px; background: rgba(239,68,68,0.08);
    border-radius: 6px; border: 1px solid rgba(239,68,68,0.2);
  }

  @media (max-width: 800px) {
    body { padding: 12px; }
    .grid { grid-template-columns: 1fr; gap: 12px; }
    .panel.wide, .panel.full-width { grid-column: span 1; }
    .one-thing-panel { grid-column: span 1; }
    .one-thing-insight { font-size: 1.2rem; max-width: 100%; }
    .one-thing-cards { grid-template-columns: 1fr; }
  }

  footer {
    margin-top: 32px;
    text-align: center;
    font-size: 0.7rem;
    color: var(--muted);
  }
</style>
</head>
<body>
<header>
  <div>
    <h1>🤖 <span>Brit</span> Mission Control</h1>
    <div class="meta">Darryl's AI Command Center · Auto-refreshes every 5 min</div>
  </div>
  <div class="meta" id="last-updated">Loading...</div>
</header>

const BASE = './data/';
const now = new Date();

function fmt(dateStr) {
  if (!dateStr) return '—';
  const d = new Date(dateStr);
  if (isNaN(d)) return dateStr;
  return d.toLocaleString('en-CA', { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
}
function fmtDate(dateStr) {
  if (!dateStr) return '—';
  const d = new Date(dateStr);
  if (isNaN(d)) return dateStr;
  return d.toLocaleDateString('en-CA', { month:'short', day:'numeric', year:'numeric' });
}
function timeAgo(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr);
  if (isNaN(d)) return '';
  const diff = (Date.now() - d) / 1000;
  if (diff < 60) return 'just now';
  if (diff < 3600) return `${Math.round(diff/60)}m ago`;
  if (diff < 86400) return `${Math.round(diff/3600)}h ago`;
  return `${Math.round(diff/86400)}d ago`;
}
function statusClass(s) {
  return { todo:'status-todo', 'in-progress':'status-in-progress', done:'status-done', blocked:'status-blocked' }[s] || 'status-todo';
}
function priClass(p) {
  return { high:'pri-high', medium:'pri-medium', low:'pri-low' }[p] || 'pri-low';
}

async function load(file) {
  const resp = await fetch(BASE + file + '?v=' + Date.now());
  if (!resp.ok) throw new Error(`${file} HTTP ${resp.status}`);
  return resp.json();
}

function panel(title, badge, badgeClass, content, extraClass) {
  return `<div class="panel${extraClass ? ' ' + extraClass : ''}">
    <div class="panel-header">
      <div class="panel-title">${title}</div>
      ${badge ? `<span class="panel-badge ${badgeClass}">${badge}</span>` : ''}
    </div>

  </div>`;
}

// ─── Panel: Meeting ROI Score ─────────────────────────────────────────
function scoreMeeting(analysis) {
  const allText = (analysis.takeaways || []).join(' ') + ' ' + (analysis.fullAnalysis || '');
  const lowerText = allText.toLowerCase();

  let score = 3; // baseline

  // Action items increase score
  const actionWords = ['action item', 'next step', 'follow up', 'will contact', 'will send', 'will schedule', 'agreed to', 'committed', 'task:', 'assigned', 'deadline', 'by friday', 'by monday', 'by eod'];
  const actionCount = actionWords.filter(w => lowerText.includes(w)).length;
  score += Math.min(3, actionCount);

  // Decisions made
  const decisionWords = ['decided', 'decision', 'agreed', 'confirmed', 'approved', 'moving forward', 'going with', 'resolved', 'signed'];
  const decisionCount = decisionWords.filter(w => lowerText.includes(w)).length;
  score += Math.min(2, decisionCount);

  // Deals / revenue discussion
  const dealWords = ['deal', 'revenue', 'contract', 'proposal', 'pricing', 'offer', 'opportunity', 'signed', 'closed', 'partnership'];
  const dealCount = dealWords.filter(w => lowerText.includes(w)).length;
  score += Math.min(2, dealCount > 2 ? 2 : dealCount > 0 ? 1 : 0);

  // Penalize vague meetings
  if (analysis.contact && analysis.contact.toLowerCase().includes('internal')) score -= 1;
  if ((analysis.takeaways || []).length <= 2) score -= 1;

  return Math.min(10, Math.max(1, score));
}

function roiColor(score) {
  if (score >= 7) return '#10b981';
  if (score >= 4) return '#f59e0b';
  return '#ef4444';
}

function roiClass(score) {
  if (score >= 7) return 'high';
  if (score >= 4) return 'medium';
  return 'low';
}

function getWeekStart() {
  const d = new Date();
  d.setHours(0,0,0,0);
  d.setDate(d.getDate() - d.getDay()); // Sunday
  return d;
}

async function renderMeetingROI() {
  try {
    const d = await load('call-analyses.json');
    const analyses = (d.analyses || []).sort((a,b) => new Date(b.date) - new Date(a.date));

    if (analyses.length === 0) {
      return panel('📊 Meeting ROI Score', 'No data', 'badge-gray',
        '<div class="empty">No call analyses yet. Connect Fathom to start tracking meeting ROI.</div>');
    }

    const weekStart = getWeekStart();
    const thisWeekAnalyses = analyses.filter(a => new Date(a.date) >= weekStart);
    const scored = analyses.slice(0, 5).map(a => ({ ...a, score: scoreMeeting(a) }));
    const weekScores = thisWeekAnalyses.map(a => scoreMeeting(a));
    const weekAvg = weekScores.length > 0
      ? Math.round(weekScores.reduce((s, x) => s + x, 0) / weekScores.length * 10) / 10
      : null;

    const avgScoreClass = weekAvg ? roiClass(weekAvg) : '';
    const summaryHtml = weekAvg !== null ? `
      <div class="roi-summary">
        <div class="roi-score-big ${avgScoreClass}">${weekAvg}</div>
        <div>
          <div class="roi-summary-label">This Week's Meeting Efficiency</div>
          <div class="roi-summary-text">${weekScores.length} meeting${weekScores.length !== 1 ? 's' : ''} analyzed · ${weekAvg >= 7 ? 'High impact week 🔥' : weekAvg >= 4 ? 'Solid, room to improve' : 'Below average — check action item capture'}</div>
        </div>
      </div>` : `
      <div class="roi-summary" style="background:rgba(107,114,128,0.08);border-color:rgba(107,114,128,0.2)">
        <div class="roi-score-big" style="color:var(--muted)">—</div>
        <div>
          <div class="roi-summary-label" style="color:var(--muted)">No meetings this week yet</div>
          <div class="roi-summary-text">Scores update as meetings are analyzed</div>
        </div>
      </div>`;

    const rowsHtml = scored.map(a => {
      const pct = (a.score / 10) * 100;
      const shortName = a.contact.length > 40 ? a.contact.slice(0, 37) + '...' : a.contact;
      return `<div class="roi-item">
        <div class="roi-bar-wrap">
          <div class="roi-meeting-name" title="${a.contact}">${shortName}</div>
          <div class="roi-meeting-date">${fmtDate(a.date)} · ${a.business || ''}</div>
        </div>
        <div class="roi-bar">
          <div class="roi-bar-fill" style="width:${pct}%;background:${roiColor(a.score)}"></div>
        </div>
        <div class="roi-score-num" style="color:${roiColor(a.score)}">${a.score}</div>
      </div>`;
    }).join('');

    return panel('📊 Meeting ROI Score', weekAvg ? `${weekAvg}/10 this week` : 'Last 5 meetings', weekAvg ? (weekAvg >= 7 ? 'badge-green' : weekAvg >= 4 ? 'badge-yellow' : 'badge-red') : 'badge-gray',
      summaryHtml + rowsHtml);
  } catch(e) {
    return panel('📊 Meeting ROI Score', 'ERROR', 'badge-red', `<div class="panel-error">Failed to load: ${e.message}</div>`);
  }
}

// ─── Panel: Time to Goal ──────────────────────────────────────────────
function projectGoalDate(goal) {
  if (!goal.dataPoints || goal.dataPoints.length < 2) return null;
  const pts = goal.dataPoints.sort((a, b) => new Date(a.date) - new Date(b.date));
  const first = pts[0], last = pts[pts.length - 1];
  const daysDiff = (new Date(last.date) - new Date(first.date)) / 86400000;
  if (daysDiff === 0) return null;
  const rate = (last.value - first.value) / daysDiff; // units per day
  if (rate <= 0) return null;
  const remaining = goal.targetValue - last.value;
  if (remaining <= 0) return 'Already achieved! 🎉';
  const daysToGoal = Math.round(remaining / rate);
  const projDate = new Date(new Date(last.date).getTime() + daysToGoal * 86400000);
  return projDate.toLocaleDateString('en-CA', { month: 'long', day: 'numeric', year: 'numeric' });
}

    const goalsHtml = goals.map(g => {

// ─── Panel: Travel ────────────────────────────────────────────────────
function fmtFlightTime(iso) {
  if (!iso || iso.length <= 10) return iso || '';
  try {
    const d = new Date(iso);
    return d.toLocaleString('en-US', { month:'short', day:'numeric', hour:'numeric', minute:'2-digit', hour12:true });
  } catch(e) { return iso; }
}
async function renderTravel() {
  try {
    const d = await load('travel.json');
    const trips = (d.trips || []).filter(t => t.status === 'upcoming' || t.status === 'active').slice(0, 3);
    const pending = d.pendingConfirmation || [];
    const html = trips.length === 0
      ? '<div class="empty">No upcoming travel</div>'
      : trips.map(t => {
        // Flights
        const flights = (t.flights || []).map(f => {
          const dep = fmtFlightTime(f.departure);
          const arr = fmtFlightTime(f.arrival);
          const dir = f.direction === 'outbound' ? '→' : '←';
          const num = f.flightNum ? ` · ${f.flightNum}` : '';
          const conf = f.confirmation ? ` (${f.confirmation})` : '';
          return `<div style="font-size:0.75rem;color:var(--text);margin:2px 0;padding-left:8px">
            ${dir} ${f.from} → ${f.to}${num}${conf}<br>
            <span style="color:var(--muted)">Depart: ${dep} · Arrive: ${arr}</span>
          </div>`;
        }).join('');
        // Hotel
        let hotel = '';
        if (t.hotel) {
          const h = t.hotel;
          const conf = h.confirmation ? ` · Conf: ${h.confirmation}` : '';
          hotel = `<div style="font-size:0.75rem;color:var(--text);margin:4px 0;padding-left:8px">
            🏨 ${h.name} — ${fmtDate(h.checkIn)} to ${fmtDate(h.checkOut)}${conf}
          </div>`;
        } else {
          hotel = `<div style="font-size:0.75rem;color:var(--warning,#e6a700);margin:4px 0;padding-left:8px">⚠️ No hotel booked</div>`;
        }
        return `
          <div class="trip-item" style="margin-bottom:12px">
            <div class="trip-dest">✈️ ${t.destination}</div>
            <div class="trip-dates">${fmtDate(t.startDate)} → ${fmtDate(t.endDate)} · ${t.purpose || ''}</div>
            ${flights}
            ${hotel}
            ${t.notes ? `<div style="font-size:0.72rem;color:var(--muted);margin-top:4px;padding-left:8px">📝 ${t.notes}</div>` : ''}
          </div>`;
      }).join('') + (pending.length > 0 ? `
        <div style="margin-top:10px;border-top:1px solid var(--border,#333);padding-top:8px">
          <div style="font-size:0.75rem;font-weight:600;color:var(--muted);margin-bottom:4px">⏳ Pending Confirmation</div>
          ${pending.map(p => `<div style="font-size:0.72rem;color:var(--muted);margin:2px 0">• ${p}</div>`).join('')}
        </div>` : '');
    return panel('✈️ Travel', trips.length + ' trips', 'badge-yellow', html);
  } catch(e) {
    return panel('✈️ Travel', 'ERROR', 'badge-red', `<div class="panel-error">Failed to load: ${e.message}</div>`);
  }
}

// ─── Panel: Documents ────────────────────────────────────────────────
async function renderDocuments() {
  try {
    const d = await load('documents.json');
    const docs = (d.documents || []).sort((a,b) => new Date(b.updated) - new Date(a.updated)).slice(0, 8);
    const html = docs.length === 0
      ? '<div class="empty">No documents tracked yet</div>'
      : docs.map(doc => `
        <div class="doc-item">
          <span class="doc-type">${doc.type || 'doc'}</span>
          <div class="doc-name">${doc.title}</div>
          <div class="doc-date">${fmtDate(doc.updated)}</div>
        </div>`).join('');
    return panel('📁 Documents', docs.length + ' tracked', 'badge-gray', html);
  } catch(e) {
    return panel('📁 Documents', 'ERROR', 'badge-red', `<div class="panel-error">Failed to load: ${e.message}</div>`);
  }
}

// ─── Panel: Call Analyses ────────────────────────────────────────────
async function renderCallAnalyses() {
  try {
    const d = await load('call-analyses.json');
    const analyses = (d.analyses || []).sort((a,b) => new Date(b.date) - new Date(a.date)).slice(0, 4);
    const html = analyses.length === 0
      ? '<div class="empty">No call analyses yet</div>'
      : analyses.map(c => `
        <div class="call-item">
          <div class="call-contact">${c.contact} · <span style="color:var(--muted);font-weight:400">${c.business || ''}</span></div>
          <div class="call-meta">${fmtDate(c.date)}</div>
          ${(c.takeaways || []).slice(0,2).map(t => `<div class="call-takeaway">• ${t}</div>`).join('')}
        </div>`).join('');
    return panel('📞 Call Analyses', analyses.length + ' calls', 'badge-purple', html);
  } catch(e) {
    return panel('📞 Call Analyses', 'ERROR', 'badge-red', `<div class="panel-error">Failed to load: ${e.message}</div>`);
  }
}

// ─── Panel: Health ────────────────────────────────────────────────────
async function renderHealth() {
  try {
    const d = await load('health.json');
    if (!d || Object.keys(d).length === 0) {
      return panel('❤️ Health', 'Not connected', 'badge-gray', '<div class="empty">Connect Oura, Apple Health, or Whoop to see data here</div>');
    }
    const metrics = Object.entries(d).map(([k, v]) => `
      <div class="health-metric">
        <div class="health-label">${k}</div>
        <div class="health-value">${typeof v === 'object' ? JSON.stringify(v) : v}</div>
      </div>`).join('');
    return panel('❤️ Health', 'Live', 'badge-green', metrics);
  } catch(e) {
    return panel('❤️ Health', 'ERROR', 'badge-red', `<div class="panel-error">Failed to load: ${e.message}</div>`);
  }
}

// ─── Panel: Learning Log ──────────────────────────────────────────────
async function renderLearning() {
  try {
    const d = await load('learning.json');

    if (!d.topic || d.status === 'pending-setup') {
      return panel('📚 Learning Log', 'Setup needed', 'badge-purple',
        `<div class="learning-empty">
          <div style="font-size:2rem;margin-bottom:8px">📚</div>
          <p style="font-size:0.8rem">Daily learning not configured yet.</p>
          <p style="font-size:0.72rem;margin-top:8px">Brit will ask what topic you want a 30-day learning plan on. First lesson: next weekday at 7:30 AM PT.</p>
        </div>`);
    }

    const progress = d.completedLessons || 0;
    const total = d.totalLessons || 30;
    const pct = Math.round((progress / total) * 100);

    const lessons = (d.lessons || []).sort((a,b) => new Date(b.date) - new Date(a.date)).slice(0, 7);
    const todayStr = new Date().toISOString().slice(0, 10);
    const todayLesson = lessons.find(l => l.date === todayStr);

    const headerHtml = `
      <div class="learning-header">
        <div class="learning-topic">📖 ${d.topic}</div>
        <div class="learning-progress">Lesson ${progress} of ${total} · ${pct}% complete</div>
        <div class="learning-bar">
          <div class="learning-fill" style="width:${pct}%"></div>
        </div>
      </div>`;

    const todayHtml = todayLesson
      ? `<div class="lesson-item lesson-today">
          <div class="lesson-num">TODAY</div>
          <div class="lesson-title">${todayLesson.title || 'Lesson ' + todayLesson.number}</div>
        </div>` : '';

    const pastLessons = lessons.filter(l => l.date !== todayStr).slice(0, 6);
    const historyHtml = pastLessons.map(l => `
      <div class="lesson-item">
        <div class="lesson-num">Lesson ${l.number || '?'}</div>
        <div class="lesson-title">${l.title || 'Lesson'}</div>
        <div class="lesson-date">${fmtDate(l.date)}</div>
      </div>`).join('');

    return panel('📚 Learning Log', `${progress}/${total} lessons`, 'badge-purple',
      headerHtml + todayHtml + historyHtml || '<div class="empty">No lessons delivered yet</div>');
  } catch(e) {
    return panel('📚 Learning Log', 'ERROR', 'badge-red', `<div class="panel-error">Failed to load: ${e.message}</div>`);
  }
}

// ─── Panel: Overnight Tasks ───────────────────────────────────────────
async function renderOvernightTasks() {
  try {
    const d = await load('overnight-tasks.json');
    const tasks = d.tasks || [];

    if (!d.lastRun && tasks.length === 0) {
      return panel('🌙 Overnight Tasks', 'First run tonight', 'badge-yellow',
        `<div class="overnight-empty">
          <div style="font-size:2rem;margin-bottom:8px">🌙</div>
          <p style="font-size:0.8rem">Overnight To-Do Tackler runs nightly at 11 PM PT.</p>
          <p style="font-size:0.72rem;margin-top:8px">Each night Brit pulls research/writing tasks from Trello and completes them while you sleep.</p>
        </div>`);
    }

    const headerHtml = d.lastRun ? `
      <div class="overnight-header">
        <span>🌙</span>
        <span>Last run: ${timeAgo(d.lastRun)} · ${d.lastSummary || tasks.length + ' tasks'}</span>
      </div>` : '';

    const tasksHtml = tasks.length === 0
      ? '<div class="empty">No tasks completed yet</div>'
      : tasks.map(t => `
        <div class="overnight-task-item">
          <div class="overnight-task-title">✅ ${t.title}</div>
          <div class="overnight-task-summary">${t.summary || ''}</div>
        </div>`).join('');

    return panel('🌙 Overnight Tasks', d.lastSummary || tasks.length + ' tasks', 'badge-yellow', headerHtml + tasksHtml);
  } catch(e) {
    return panel('🌙 Overnight Tasks', 'ERROR', 'badge-red', `<div class="panel-error">Failed to load: ${e.message}</div>`);
  }
}

// ─── Render All Panels ────────────────────────────────────────────────
async function renderAll() {
  document.getElementById('last-updated').textContent = 'Updated ' + new Date().toLocaleTimeString();

  const grid = document.getElementById('dashboard-grid');
  grid.innerHTML = '';

  // "One Thing" spans full width — render first and immediately
  try {
    const oneThing = await renderOneThing();
    const div = document.createElement('div');
    div.innerHTML = oneThing;
    const el = div.firstElementChild;
    if (el) grid.appendChild(el);
  } catch(e) {
    const div = document.createElement('div');
    div.innerHTML = `<div class="one-thing-panel"><div class="one-thing-empty"><div class="big-text" style="color:#f87171">Panel error</div><p>${e.message}</p></div></div>`;
    grid.appendChild(div.firstElementChild);
  }

  // All other panels in parallel
  const renderers = [
    renderAnomalies,
    renderMeetingROI,
    renderGoals,
    renderCompetitorIntel,
    renderMomentum,
    renderSecurity,
    renderTasks,
    renderMeetings,
    renderActivity,
    renderCallAnalyses,
    renderLearning,
    renderOvernightTasks,
    renderTravel,
    renderDocuments,
    renderHealth,
  ];

  const results = await Promise.allSettled(renderers.map(fn => fn()));
  for (const result of results) {
    const div = document.createElement('div');
    if (result.status === 'fulfilled') {
      div.innerHTML = result.value;
    } else {
      div.innerHTML = `<div class="panel"><div class="panel-header"><div class="panel-title">Panel</div></div><div class="panel-error">Render error: ${result.reason?.message || 'unknown'}</div></div>`;
    }
    grid.appendChild(div.firstElementChild || div);
  }
}

renderAll();
</script>
