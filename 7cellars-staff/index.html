<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>7 Cellars Staff Dashboard</title>
<meta name="theme-color" content="#0D1B2A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="7 Cellars">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.jpg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0D1B2A;
  --bg-2:#0a1522;
  --surface:#070d14;
  --surface-2:#0c1420;
  --surface-3:#111c2b;
  --surface-4:#162336;
  --line:rgba(201,169,110,.18);
  --line-soft:rgba(255,255,255,.08);
  --text:#E4E8EC;
  --text-soft:#8898b0;
  --text-faint:#63758f;
  --gold:#C9A96E;
  --gold-2:#e1c18b;
  --success:#4cc38a;
  --warn:#d3ac54;
  --danger:#d36666;
  --shadow:0 20px 50px rgba(0,0,0,.34);
  --radius:22px;
  --radius-sm:16px;
  --radius-xs:12px;
  --touch:52px;
  --max:1480px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:linear-gradient(180deg,#0D1B2A 0%,#09111a 100%);color:var(--text);font-family:'Inter',system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100%;scroll-behavior:smooth;overscroll-behavior-y:contain}
body{min-height:100vh}
a{color:inherit}
button,input,select{font:inherit}
button{cursor:pointer}
img{max-width:100%;display:block}
.hidden{display:none!important}
.muted{color:var(--text-soft)}
.gold{color:var(--gold)}
.small{font-size:12px}
.app-shell{min-height:100vh;padding-bottom:96px}

.login-screen{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:28px;
  background:
    radial-gradient(circle at top left, rgba(201,169,110,.14), transparent 28%),
    radial-gradient(circle at bottom right, rgba(255,255,255,.05), transparent 30%),
    linear-gradient(180deg, #0D1B2A, #070d14 62%);
}
.login-card{
  width:min(100%,420px);
  background:linear-gradient(180deg,rgba(13,27,42,.92),rgba(7,13,20,.94));
  border:1px solid var(--line);
  border-radius:32px;
  box-shadow:var(--shadow);
  padding:34px 28px 28px;
  position:relative;
  overflow:hidden;
}
.login-card::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(135deg,rgba(201,169,110,.12),transparent 36%,transparent 68%,rgba(201,169,110,.08));
  pointer-events:none;
}
.login-brand{display:flex;flex-direction:column;align-items:center;gap:14px;margin-bottom:24px;text-align:center;position:relative;z-index:1}
.login-brand img{width:74px;height:74px;border-radius:20px;box-shadow:0 12px 24px rgba(0,0,0,.35)}
.login-brand h1{margin:0;font-size:32px;letter-spacing:.02em}
.login-brand p{margin:0;color:var(--text-soft);line-height:1.5}
.login-form{display:grid;gap:14px;position:relative;z-index:1}
.input-shell{
  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.09);
  border-radius:18px;
  padding:14px 16px;
}
.input-shell label{display:block;font-size:12px;text-transform:uppercase;letter-spacing:.12em;color:var(--text-faint);margin-bottom:8px}
.input-shell input{width:100%;border:none;outline:none;background:transparent;color:var(--text);font-size:16px}
.input-shell input::placeholder{color:#6d7c92}
.btn{
  min-height:var(--touch);
  border:none;
  border-radius:16px;
  padding:12px 18px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  font-weight:700;
  letter-spacing:.01em;
  transition:transform .18s ease, box-shadow .18s ease, background .18s ease, color .18s ease, border-color .18s ease;
}
.btn:active{transform:translateY(1px) scale(.995)}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold-2));color:#21170a;box-shadow:0 16px 30px rgba(201,169,110,.22)}
.btn-gold:hover{box-shadow:0 18px 32px rgba(201,169,110,.28)}
.btn-ghost{background:rgba(255,255,255,.03);color:var(--text);border:1px solid rgba(255,255,255,.08)}
.btn-ghost:hover{background:rgba(255,255,255,.06)}
.btn-soft{background:rgba(201,169,110,.12);color:var(--gold);border:1px solid rgba(201,169,110,.25)}
.btn-quote{background:#0D1B2A;color:#fff;border:1px solid rgba(100,140,200,.35);box-shadow:0 16px 30px rgba(0,0,0,.28)}
.btn-quote:hover{box-shadow:0 18px 32px rgba(0,0,0,.4);border-color:rgba(100,140,200,.55)}
.btn-quote:disabled{opacity:.45;cursor:not-allowed}
.btn-danger{background:rgba(211,102,102,.12);color:#efb1b1;border:1px solid rgba(211,102,102,.24)}
.login-error{display:none;color:#efb1b1;background:rgba(211,102,102,.12);border:1px solid rgba(211,102,102,.24);padding:12px 14px;border-radius:14px;font-size:13px}
.login-note{font-size:12px;color:var(--text-faint);text-align:center;margin-top:4px}

.pull-indicator{
  position:fixed;
  top:max(10px,env(safe-area-inset-top));
  left:50%;
  transform:translate(-50%,-120%);
  z-index:90;
  background:rgba(7,13,20,.96);
  border:1px solid var(--line);
  border-radius:999px;
  padding:10px 16px;
  display:flex;
  align-items:center;
  gap:10px;
  color:var(--text-soft);
  box-shadow:var(--shadow);
  transition:transform .24s ease, opacity .24s ease;
  opacity:0;
}
.pull-indicator.visible{transform:translate(-50%,0);opacity:1}
.pull-dot{width:10px;height:10px;border-radius:50%;background:var(--gold);box-shadow:0 0 0 6px rgba(201,169,110,.12)}

.header-wrap{position:sticky;top:0;z-index:40;background:rgba(7,13,20,.76);backdrop-filter:blur(18px);border-bottom:1px solid rgba(255,255,255,.04);padding-top:env(safe-area-inset-top,0px)}
.header-accent{height:2px;background:linear-gradient(90deg,transparent,rgba(201,169,110,.9),transparent)}
.header{
  width:min(calc(100% - 24px),var(--max));
  margin:0 auto;
  padding:10px 0;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:14px;
}
.brand{display:flex;align-items:center;gap:12px;min-width:0}
.brand img{width:42px;height:42px;border-radius:12px;box-shadow:0 10px 26px rgba(0,0,0,.28)}
.brand-copy{min-width:0}
.brand-copy h1{margin:0;font-size:20px;white-space:nowrap}
.brand-copy p{margin:4px 0 0;color:var(--text-soft);font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.header-actions{display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:flex-end}
.header-actions .btn{min-width:var(--touch)}
.desktop-new-sale{padding:8px 14px;min-height:42px;font-size:14px}

.top-tabs-wrap{border-top:1px solid rgba(255,255,255,.03)}
.top-tabs{
  width:min(calc(100% - 24px),var(--max));
  margin:0 auto;
  display:flex;
  gap:10px;
  overflow:auto;
  padding:12px 0 14px;
  scrollbar-width:none;
}
.top-tabs::-webkit-scrollbar{display:none}
.tab-btn{
  border:none;
  background:rgba(255,255,255,.03);
  color:var(--text-soft);
  border:1px solid transparent;
  border-radius:999px;
  min-height:var(--touch);
  padding:10px 18px;
  white-space:nowrap;
  display:inline-flex;
  align-items:center;
  gap:10px;
  font-weight:600;
}
.tab-btn.active{color:var(--text);background:rgba(201,169,110,.12);border-color:rgba(201,169,110,.22);box-shadow:inset 0 0 0 1px rgba(255,255,255,.02)}
.tab-badge{background:rgba(201,169,110,.14);color:var(--gold);padding:2px 8px;border-radius:999px;font-size:11px;font-weight:700}

.main{
  width:min(calc(100% - 24px),var(--max));
  margin:0 auto;
  padding:22px 0 40px;
}
.tab-panel{display:none;animation:panelIn .26s ease;overflow:hidden;max-width:100%}
.tab-panel.active{display:block}
@keyframes panelIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.hero-banner{
  background:
    radial-gradient(circle at top right, rgba(201,169,110,.13), transparent 28%),
    linear-gradient(135deg, rgba(255,255,255,.05), rgba(255,255,255,.02)),
    linear-gradient(180deg, rgba(13,27,42,.92), rgba(7,13,20,.96));
  border:1px solid var(--line);
  border-radius:30px;
  padding:26px;
  box-shadow:var(--shadow);
  display:grid;
  grid-template-columns:1.35fr .95fr;
  gap:18px;
  margin-bottom:18px;
}
.hero-copy h2{margin:0;font-size:30px;line-height:1.06}
.hero-copy p{margin:12px 0 0;color:var(--text-soft);line-height:1.6;max-width:64ch}
.hero-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:20px}
.hero-stats{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;align-content:start}
.hero-stat{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:22px;padding:18px}
.hero-stat .label{font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--text-faint);margin-bottom:8px}
.hero-stat .value{font-size:28px;font-weight:800}
.hero-stat .sub{margin-top:6px;font-size:12px;color:var(--text-soft)}

.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin:18px 0}
.kpi-card{
  background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.025));
  border:1px solid rgba(255,255,255,.07);
  border-radius:24px;
  padding:20px;
  box-shadow:0 14px 32px rgba(0,0,0,.22);
}
.kpi-card .label{font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--text-faint);margin-bottom:10px}
.kpi-card .value{font-size:34px;font-weight:800;line-height:1}
.kpi-card .sub{margin-top:10px;color:var(--text-soft);font-size:13px;line-height:1.45}
.kpi-card.alert .value{color:var(--gold)}

.grid-2{display:grid;grid-template-columns:1.1fr .9fr;gap:16px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.card{
  background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,.02));
  border:1px solid rgba(255,255,255,.07);
  border-radius:26px;
  box-shadow:0 12px 28px rgba(0,0,0,.18);
  overflow:hidden;
}
.card-header{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:18px 20px;border-bottom:1px solid rgba(255,255,255,.06)}
.card-header h3{margin:0;font-size:17px}
.card-header p{margin:3px 0 0;color:var(--text-soft);font-size:13px}
.card-body{padding:18px 20px 20px}
.stack{display:grid;gap:14px}

.activity-list,.customer-list,.task-list,.list-clean{display:grid;gap:12px}
.list-item{
  padding:14px 16px;
  border-radius:18px;
  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.06);
}
.list-item-top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}
.list-item h4{margin:0 0 6px;font-size:15px}
.list-item p{margin:0;color:var(--text-soft);line-height:1.55;font-size:13px}

.table-wrap{overflow:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;min-width:760px}
th,td{text-align:left;padding:14px 12px;border-bottom:1px solid rgba(255,255,255,.06);vertical-align:top}
th{font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--text-faint);font-weight:700}
td{font-size:14px}
tr:nth-child(even) td{background:rgba(255,255,255,.015)}
tr:hover td{background:rgba(201,169,110,.05)}
.table-title{font-weight:700}
.table-sub{display:block;color:var(--text-soft);font-size:12px;margin-top:4px}

.badge{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:999px;font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase}
.badge.gold{background:rgba(201,169,110,.16);color:var(--gold);border:1px solid rgba(201,169,110,.22)}
.badge.green{background:rgba(76,195,138,.14);color:#8fe2b5;border:1px solid rgba(76,195,138,.2)}
.badge.yellow{background:rgba(211,172,84,.14);color:#e7cb90;border:1px solid rgba(211,172,84,.2)}
.badge.red{background:rgba(211,102,102,.14);color:#f0b0b0;border:1px solid rgba(211,102,102,.2)}
.badge.blue{background:rgba(102,157,211,.14);color:#a3caef;border:1px solid rgba(102,157,211,.2)}
.badge.gray{background:rgba(120,130,145,.14);color:#9aabb8;border:1px solid rgba(120,130,145,.2)}

.signature-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:9000;display:flex;align-items:center;justify-content:center;padding:16px;animation:pmFadeIn .18s ease}
.signature-modal{background:var(--surface-3);border-radius:24px;width:min(100%,700px);max-height:95vh;overflow-y:auto;display:flex;flex-direction:column;animation:pmSlideUp .2s ease}
.sig-header{display:flex;justify-content:space-between;align-items:flex-start;padding:18px 20px;border-bottom:1px solid rgba(255,255,255,.07)}
.sig-header h3{margin:0;font-size:18px}
.sig-header p{margin:4px 0 0;color:var(--text-soft);font-size:13px}
.sig-body{padding:18px 20px 20px;flex:1;display:flex;flex-direction:column;gap:14px}
.sig-order-summary{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:18px;padding:14px 16px;font-size:13px;color:var(--text-soft)}
.sig-canvas-wrap{flex:1;min-height:180px;border-radius:18px;background:#fff;border:1px solid rgba(0,0,0,.1);box-shadow:inset 0 2px 8px rgba(0,0,0,.1);cursor:crosshair}
.signature-canvas{display:block;width:100%;height:100%;touch-action:none}
.sig-actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.sig-actions .btn{flex:1}
.signature-thumb{width:auto;height:40px;border-radius:4px;background:#fff;border:1px solid rgba(255,255,255,.1);cursor:pointer;margin-top:8px}
.signature-lightbox{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:9100;display:flex;align-items:center;justify-content:center;padding:24px;animation:pmFadeIn .18s ease}
.signature-lightbox img{max-width:100%;max-height:100%;border-radius:12px;border:2px solid rgba(255,255,255,.2)}


.toolbar{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:16px}
.search{flex:1 1 280px;position:relative}
.search input,.select,.text-input,.number-input,.textarea{
  width:100%;
  min-height:var(--touch);
  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.08);
  color:var(--text);
  border-radius:16px;
  padding:12px 14px;
  outline:none;
}
.search input{padding-left:42px}
.search::before{content:"⌕";position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-faint);font-size:18px}
.select{width:auto;min-width:160px;padding-right:40px}
.select option{background:#0c1520;color:var(--text)}
.filter-pills{display:flex;gap:10px;flex-wrap:wrap}
.pill{
  min-height:40px;
  padding:10px 14px;
  border-radius:999px;
  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.06);
  color:var(--text-soft);
  font-weight:600;
}
.pill.active{background:rgba(201,169,110,.12);border-color:rgba(201,169,110,.22);color:var(--text)}

.catalog-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px}
.wine-card{
  padding:18px;
  border-radius:24px;
  background:linear-gradient(180deg,rgba(255,255,255,.045),rgba(255,255,255,.025));
  border:1px solid rgba(255,255,255,.07);
  display:flex;
  flex-direction:column;
  gap:14px;
  min-height:238px;
}
.wine-head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}
.wine-type{font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--text-faint)}
.wine-title{font-size:18px;font-weight:700;line-height:1.35;margin:0}
.wine-meta{display:flex;gap:10px;flex-wrap:wrap;color:var(--text-soft);font-size:12px}
.wine-notes-wrap{display:grid;gap:4px}
.wine-notes{margin:0;font-size:13px;line-height:1.5;color:var(--text-soft)}
.wine-notes-toggle{background:none;border:none;color:var(--gold);font-size:12px;font-weight:600;padding:0;cursor:pointer;text-align:left}
.new-customer-form{padding:4px 0}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;max-width:100%;overflow:hidden}
.form-field{display:grid;gap:4px}
.form-field.full{grid-column:1/-1}
.form-field label{font-size:12px;font-weight:600;color:var(--text-soft)}
.form-field input,.form-field textarea{min-height:var(--touch);background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);color:var(--text);border-radius:12px;padding:10px 14px;outline:none;font:inherit;font-size:14px}
.form-field input:focus,.form-field textarea:focus{border-color:rgba(201,169,110,.3)}
.send-buttons{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.btn-send-wa{background:rgba(37,211,102,.15);border-color:rgba(37,211,102,.3);color:#25d366}
.btn-send-email{background:rgba(66,133,244,.12);border-color:rgba(66,133,244,.25);color:#4285f4}
.wine-price{font-size:26px;font-weight:800;color:var(--gold);line-height:1}
.wine-card .btn-sm{white-space:nowrap}

/* ── Price section on wine card ─────────────────────────────── */
.wine-price-section{cursor:pointer;padding:10px 12px;border-radius:14px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);transition:border-color .15s,background .15s;margin-top:auto}
.wine-price-section:hover,.wine-price-section:active{border-color:rgba(201,169,110,.3);background:rgba(201,169,110,.06)}
.wine-price-row{display:flex;align-items:center;gap:0}
.wine-price-col{flex:1;text-align:center}
.wine-price-divider{width:1px;height:32px;background:rgba(255,255,255,.1)}
.wine-price-value{font-size:18px;font-weight:800;color:var(--gold);line-height:1}
.wine-price-value.retail{color:var(--text);font-weight:600;font-size:16px}
.wine-price-label{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--text-faint);margin-top:2px}
.margin-badge{display:inline-block;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:700;margin-top:6px}
.margin-badge.success{background:rgba(76,195,138,.15);color:var(--success);border:1px solid rgba(76,195,138,.25)}
.margin-badge.warn{background:rgba(211,172,84,.15);color:var(--warn);border:1px solid rgba(211,172,84,.25)}
.margin-badge.danger{background:rgba(211,102,102,.15);color:var(--danger);border:1px solid rgba(211,102,102,.25)}
.wine-price-tap-hint{font-size:10px;color:var(--text-faint);margin-top:4px;text-align:right}

/* ── Price modal ────────────────────────────────────────────── */
.price-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:9000;display:flex;align-items:flex-end;justify-content:center;padding:0;animation:pmFadeIn .18s ease}
@keyframes pmFadeIn{from{opacity:0}to{opacity:1}}
.price-modal{background:var(--surface-3);border-radius:28px 28px 0 0;width:100%;max-width:560px;max-height:88vh;overflow-y:auto;padding:0;animation:pmSlideUp .2s ease}
@keyframes pmSlideUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
.pm-header{display:flex;justify-content:space-between;align-items:flex-start;padding:20px 20px 14px;border-bottom:1px solid rgba(255,255,255,.07)}
.pm-type{font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--text-faint);margin-bottom:4px}
.pm-title{margin:0;font-size:18px;font-weight:700;line-height:1.3}
.pm-close{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);color:var(--text);width:36px;height:36px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;margin-top:2px}
.pm-body{padding:16px 20px 28px;display:grid;gap:18px}
.pm-section-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text-faint);margin-bottom:10px}
.pm-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.pm-row:last-child{border-bottom:none}
.pm-label{font-size:14px;color:var(--text-soft)}
.pm-value{font-size:15px;font-weight:700;color:var(--text)}
.pm-value.gold{color:var(--gold)}
.pm-tiers{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:10px}
.pm-tier{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:12px;text-align:center}
.pm-tier-name{font-size:12px;font-weight:700;color:var(--text-soft);margin-bottom:6px}
.pm-tier-mult{color:var(--gold)}
.pm-tier-price{font-size:17px;font-weight:800;color:var(--text);line-height:1.2}
.pm-tier-label{font-size:11px;font-weight:400;color:var(--text-faint)}
.pm-tier-profit{font-size:11px;color:var(--success);margin-top:4px}
.pm-hint{font-size:12px;color:var(--text-faint);line-height:1.5;margin:0}

.stock-meter{height:8px;border-radius:999px;background:rgba(255,255,255,.06);overflow:hidden}
.stock-fill{height:100%;border-radius:999px}
.stock-fill.green{background:linear-gradient(90deg,#2f8f61,#65dba3)}
.stock-fill.yellow{background:linear-gradient(90deg,#b18733,#e0c07a)}
.stock-fill.red{background:linear-gradient(90deg,#9c4343,#da7a7a)}

.sale-layout{display:grid;grid-template-columns:1.25fr .95fr;gap:16px;align-items:start}
.sale-flow{display:grid;gap:16px}
.step-card{border-radius:28px;overflow:hidden}
.step-head{display:flex;justify-content:space-between;gap:12px;align-items:center;padding:18px 20px;border-bottom:1px solid rgba(255,255,255,.06)}
.step-no{display:inline-flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:50%;background:rgba(201,169,110,.14);color:var(--gold);font-weight:800}
.step-title-wrap{display:flex;align-items:center;gap:12px}
.step-title-wrap h3{margin:0;font-size:17px}
.customer-picker,.wine-picker{display:grid;gap:12px}
.selectable-list{display:grid;gap:10px;max-height:360px;overflow:auto;padding-right:4px}
.selectable-item{
  border:1px solid rgba(255,255,255,.07);
  background:rgba(255,255,255,.03);
  border-radius:18px;
  padding:18px 18px;
  display:flex;
  justify-content:space-between;
  gap:12px;
  align-items:center;
}
.selectable-item.active{border-color:rgba(201,169,110,.3);background:rgba(201,169,110,.1)}
.selectable-main{min-width:0}
.selectable-main h4{margin:0 0 6px;font-size:17px}
.selectable-main p{margin:0;color:var(--text-soft);font-size:14px;line-height:1.45}
.selectable-item .btn{padding:10px 14px;min-height:40px}
.order-lines{display:grid;gap:12px;max-height:430px;overflow:auto;padding-right:4px}
.line-item{
  border:1px solid rgba(255,255,255,.07);
  background:rgba(255,255,255,.03);
  border-radius:20px;
  padding:16px;
  display:grid;
  gap:12px;
}
.line-top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}
.line-title{margin:0;font-size:15px;font-weight:700}
.line-sub{margin-top:6px;color:var(--text-soft);font-size:12px}
.qty-controls{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.qty-btn{
  width:56px;height:56px;border-radius:14px;border:1px solid rgba(255,255,255,.08);
  background:rgba(255,255,255,.04);color:var(--text);font-size:26px;display:inline-flex;align-items:center;justify-content:center;
}
.qty-value{min-width:64px;text-align:center;font-weight:800;font-size:24px}
.qty-input{width:80px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:12px;color:var(--text);padding:8px 4px;-moz-appearance:textfield}
.qty-input::-webkit-outer-spin-button,.qty-input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.sale-summary{position:sticky;top:136px}
.summary-totals{display:grid;gap:12px}
.total-row{display:flex;justify-content:space-between;gap:12px;align-items:center;font-size:15px}
.total-row.grand{font-size:22px;font-weight:800;color:var(--gold);padding-top:8px;border-top:1px solid rgba(255,255,255,.08)}
.summary-actions{display:grid;gap:10px;margin-top:18px}
.confirm-card{display:grid;gap:16px;text-align:center}
.confirm-icon{font-size:64px;line-height:1}

.orders-cards-mobile{display:none}
.order-card-mobile{padding:16px;border-radius:20px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);word-break:break-word}
.orders-cards-mobile{display:none;grid-template-columns:1fr;gap:12px}
.quote-link-box{
  display:flex;align-items:center;gap:10px;
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);
  border-radius:14px;padding:12px 14px;
  word-break:break-all;font-size:13px;
  color:var(--gold);text-decoration:none;flex:1;
}
.quote-link-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:12px}
.quote-share-buttons{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.quote-card{
  padding:18px;border-radius:22px;
  border:1px solid rgba(100,140,200,.3);
  background:linear-gradient(180deg,rgba(13,27,42,.88),rgba(7,13,20,.92));
  cursor:pointer;
  transition:border-color .15s;
}
.quote-card:hover{border-color:rgba(100,140,200,.6)}
.quote-card.accepted{border-color:rgba(76,195,138,.4);background:linear-gradient(180deg,rgba(76,195,138,.07),rgba(76,195,138,.03))}
.quote-head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:10px}
.quote-title{margin:0;font-size:17px}
.quote-meta{display:flex;gap:10px;flex-wrap:wrap;color:var(--text-soft);font-size:13px}
.quote-section-header{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.quote-section-header h3{margin:0;font-size:17px}
.pending-wrap{display:grid;gap:14px;margin-bottom:18px}
.pending-card{padding:18px;border-radius:22px;border:1px solid rgba(201,169,110,.25);background:linear-gradient(180deg,rgba(201,169,110,.08),rgba(201,169,110,.04))}
.pending-head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:10px}
.pending-title{margin:0;font-size:17px}
.pending-meta{display:flex;gap:10px;flex-wrap:wrap;color:var(--text-soft);font-size:13px}
.pending-lines{display:grid;gap:8px;margin-top:12px}
.pending-line{display:flex;justify-content:space-between;gap:12px;font-size:13px;color:var(--text-soft)}

.customer-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}
.customer-card{padding:18px;border-radius:24px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);display:grid;gap:14px}
.customer-top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}
.customer-name{margin:0;font-size:17px}
.customer-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.customer-stat{padding:12px;border-radius:16px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.05)}
.customer-stat .label{font-size:11px;text-transform:uppercase;letter-spacing:.11em;color:var(--text-faint);margin-bottom:6px}
.customer-stat .value{font-size:17px;font-weight:700}
.mini-orders{display:grid;gap:10px}
.mini-order{padding:12px 14px;border-radius:16px;background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.05)}
.mini-order-top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;font-size:13px;margin-bottom:6px}
.mini-order-items{color:var(--text-soft);font-size:12px;line-height:1.5}

.customer-notes-section{display:grid;gap:10px}
.customer-notes-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:2px}
.customer-notes-header h4{margin:0}
.btn-add-note{padding:6px 12px;min-height:30px;font-size:12px;border-radius:8px;font-weight:600;background:rgba(201,169,110,.12);border:1px solid rgba(201,169,110,.25);color:var(--gold)}
.btn-add-note:hover{background:rgba(201,169,110,.2)}
.note-items{display:grid;gap:8px}
.note-item{padding:10px 12px;border-radius:14px;background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.05)}
.note-item-text{font-size:13px;line-height:1.5;margin-bottom:4px;word-break:break-word}
.note-item-meta{display:flex;gap:8px;font-size:11px;align-items:center}
.note-author{color:var(--gold);font-weight:600}
.note-timestamp{color:var(--text-faint)}
.notes-show-all{background:none;border:none;color:var(--gold);font-size:12px;padding:4px 0;cursor:pointer;text-decoration:underline;text-underline-offset:3px}
.note-form{display:grid;gap:8px;padding:12px;border-radius:16px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);margin-top:4px}
.note-form textarea{width:100%;border:1px solid rgba(255,255,255,.1);border-radius:10px;background:rgba(255,255,255,.04);color:var(--text);padding:10px 12px;font-size:13px;resize:vertical;min-height:72px;font-family:inherit;outline:none}
.note-form textarea::placeholder{color:var(--text-faint)}
.note-form textarea:focus{border-color:rgba(201,169,110,.35)}
.note-chips{display:flex;flex-wrap:wrap;gap:6px}
.note-chip{padding:5px 10px;border-radius:999px;border:1px solid rgba(201,169,110,.2);background:rgba(201,169,110,.07);color:var(--text-soft);font-size:11px;cursor:pointer;transition:background .15s}
.note-chip:hover{background:rgba(201,169,110,.16);color:var(--gold)}
.note-form-actions{display:flex;gap:8px}
.btn-save-note{padding:8px 16px;min-height:34px;font-size:13px;border-radius:10px;font-weight:600;background:var(--gold);color:#0D1B2A;border:none}
.btn-cancel-note{padding:8px 14px;min-height:34px;font-size:13px;border-radius:10px;font-weight:600;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:var(--text-soft)}

.kanban{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px}
.kanban-col{border-radius:26px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);padding:16px;display:grid;gap:12px;align-content:start}
.kanban-head{display:flex;justify-content:space-between;align-items:center;gap:10px;padding-bottom:6px}
.kanban-head h3{margin:0;font-size:15px}
.kanban-toggle{display:block;width:100%;border:none;background:transparent;color:inherit;padding:0;text-align:left;cursor:pointer}
.kanban-count{padding:5px 10px;border-radius:999px;background:rgba(255,255,255,.05);color:var(--text-soft);font-size:12px;font-weight:700}
.kanban-body{display:grid;gap:12px}
.kanban-task{padding:15px;border-radius:20px;background:linear-gradient(180deg,rgba(255,255,255,.045),rgba(255,255,255,.025));border:1px solid rgba(255,255,255,.06);display:grid;gap:10px;overflow:hidden;word-break:break-word}
.kanban-task h4{margin:0;font-size:15px;line-height:1.4}
.kanban-task p{margin:0;color:var(--text-soft);font-size:13px;line-height:1.55}
.kanban-meta{display:flex;flex-wrap:wrap;gap:8px}
.kanban-actions{display:flex;gap:8px;flex-wrap:wrap;padding-top:4px}
.btn-sm{padding:8px 14px;min-height:36px;font-size:13px;border-radius:10px;font-weight:600}
.btn-muted{background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.08);color:var(--text-soft)}
.kanban-toggle::after{content:"▾";float:right;font-size:14px;color:var(--text-faint);transition:transform .2s}
.kanban-col[data-collapsed='true'] .kanban-toggle::after{transform:rotate(-90deg)}
.kanban-tabs{display:none}
.kanban-tab{padding:10px 18px;border-radius:999px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);color:var(--text-soft);font-size:14px;font-weight:600;white-space:nowrap}
.kanban-tab.active{background:rgba(201,169,110,.14);border-color:rgba(201,169,110,.25);color:var(--gold)}
.kanban-tab .tab-count{margin-left:6px;opacity:.7;font-weight:700}
.kanban-swipe{display:none;overflow:hidden;max-width:100%}

.empty-state{
  text-align:center;
  padding:34px 16px;
  border:1px dashed rgba(201,169,110,.2);
  border-radius:24px;
  background:rgba(255,255,255,.02);
}
.empty-state .emoji{font-size:34px;margin-bottom:10px}
.empty-state h4{margin:0 0 8px;font-size:18px}
.empty-state p{margin:0;color:var(--text-soft);line-height:1.6;max-width:46ch;margin-inline:auto}

.mobile-bottom-nav{
  position:fixed;
  left:12px;right:12px;bottom:calc(12px + env(safe-area-inset-bottom));
  z-index:50;
  background:rgba(7,13,20,.94);
  border:1px solid rgba(255,255,255,.08);
  border-radius:26px;
  box-shadow:var(--shadow);
  padding:8px;
  display:none;
  overflow-x:auto;
  -webkit-overflow-scrolling:touch;
  gap:6px;
  backdrop-filter:blur(18px);
  scrollbar-width:none;
}
.mobile-bottom-nav::-webkit-scrollbar{display:none}
.mobile-nav-btn{
  min-height:66px;
  min-width:68px;
  border:none;
  border-radius:18px;
  background:transparent;
  color:var(--text-faint);
  display:grid;
  place-items:center;
  gap:4px;
  padding:8px 4px;
  font-size:12px;
  font-weight:700;
  flex-shrink:0;
}
.mobile-nav-btn .icon{font-size:22px;line-height:1}
.mobile-nav-btn.active{background:rgba(201,169,110,.12);color:var(--gold)}

.mobile-sale-bar{
  position:fixed;
  left:0;right:0;bottom:0;
  z-index:60;
  background:rgba(7,13,20,.97);
  border-top:1px solid var(--line);
  padding:12px 16px calc(12px + env(safe-area-inset-bottom));
  display:none;
  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);
}
.mobile-sale-bar .sale-bar-inner{
  display:flex;align-items:center;gap:12px;
}
.mobile-sale-bar .sale-bar-summary{flex:1;min-width:0}
.mobile-sale-bar .sale-bar-summary .sale-bar-customer{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mobile-sale-bar .sale-bar-summary .sale-bar-detail{font-size:12px;color:var(--text-soft)}
.mobile-sale-bar .sale-bar-actions{display:flex;gap:8px;flex-shrink:0}
.mobile-sale-bar .sale-bar-actions button{
  padding:10px 18px;border-radius:14px;border:none;font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap;
}
.mobile-sale-bar .btn-bar-submit{background:linear-gradient(135deg,var(--gold),var(--gold-2));color:#23190a}
.mobile-sale-bar .btn-bar-quote{background:var(--surface-3);color:var(--text);border:1px solid var(--line) !important}
@media (min-width:981px){.mobile-sale-bar{display:none !important}}

.fab{
  position:fixed;
  right:18px;
  bottom:calc(100px + env(safe-area-inset-bottom));
  width:56px;height:56px;border-radius:50%;
  border:none;
  z-index:55;
  background:linear-gradient(135deg,var(--gold),var(--gold-2));
  color:#23190a;
  box-shadow:0 20px 36px rgba(201,169,110,.3);
  display:none;
  align-items:center;
  justify-content:center;
  font-size:28px;
  font-weight:300;
}

@media (max-width:1190px){
  .catalog-grid{grid-template-columns:repeat(3,minmax(0,1fr))}
  .kpi-grid{grid-template-columns:repeat(2,1fr)}
}
@media (max-width:980px){
  .hero-banner,.grid-2,.sale-layout{grid-template-columns:1fr}
  .hero-stats{grid-template-columns:repeat(2,1fr)}
  .sale-summary{position:static}
  .customer-grid{grid-template-columns:1fr}
}
@media (max-width:767px){
  .header{padding:8px 0;align-items:center}
  .brand img{width:38px;height:38px}
  .brand-copy h1{font-size:18px}
  .brand-copy p{display:none}
  .top-tabs-wrap{display:none}
  .mobile-bottom-nav{display:flex}
  .fab{display:flex}
  .desktop-new-sale{display:none}
  .header-actions{width:auto;justify-content:flex-end}
  .main{padding:18px 0 26px}
  .hero-banner{padding:20px;border-radius:24px}
  .hero-copy h2{font-size:24px}
  .hero-stats,.kpi-grid,.grid-3{grid-template-columns:1fr}
  .kanban{display:none}
  .kanban-tabs{display:flex;gap:8px;overflow-x:auto;padding:0 4px 12px;-webkit-overflow-scrolling:touch}
  .kanban-swipe{display:block}
  .kanban-swipe .kanban-body{display:grid;gap:12px}
  .kanban-swipe .kanban-col{border:none;background:none;padding:0}
  .catalog-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
  .card,.step-card{border-radius:22px}
  .table-wrap table{min-width:660px}
  .form-grid{grid-template-columns:1fr}
  .form-field.full{grid-column:1}
  .sale-layout{grid-template-columns:1fr}
  .orders-table-desktop{display:none}
  .orders-cards-mobile{display:grid}
}
@media (max-width:520px){
  .login-card{padding:28px 22px 22px}
  .catalog-grid{grid-template-columns:1fr;gap:12px}
  .wine-card{padding:15px;min-height:220px}
  .customer-stats{grid-template-columns:1fr}
  .toolbar{align-items:stretch}
  .select{width:100%}
  .form-grid{grid-template-columns:1fr}
  .form-field.full{grid-column:1}
  .new-customer-form{overflow:hidden}
}

/* ── Receipts Tab ───────────────────────────────────────────── */
.receipt-capture-card{border-radius:26px;overflow:hidden;margin-bottom:16px}
.receipt-img-btn{
  width:100%;min-height:var(--touch);
  border:2px dashed rgba(201,169,110,.35);
  border-radius:18px;
  background:rgba(201,169,110,.06);
  color:var(--gold);
  display:flex;align-items:center;justify-content:center;gap:10px;
  font-weight:700;font-size:15px;
  transition:background .18s,border-color .18s;
  cursor:pointer;
}
.receipt-img-btn:hover{background:rgba(201,169,110,.1);border-color:rgba(201,169,110,.5)}
.receipt-preview{
  width:100%;max-height:220px;object-fit:contain;border-radius:14px;
  border:1px solid rgba(201,169,110,.2);
  margin-bottom:14px;display:none;
}
.receipt-preview.visible{display:block}
.receipt-form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px}
.receipt-form-grid .full{grid-column:1/-1}
.rfield{display:grid;gap:6px}
.rfield label{font-size:12px;font-weight:600;color:var(--text-soft);letter-spacing:.04em}
.rfield input,.rfield select,.rfield textarea{
  width:100%;min-height:var(--touch);
  background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);
  color:var(--text);border-radius:14px;padding:12px 14px;
  outline:none;font:inherit;font-size:15px;
}
.rfield input:focus,.rfield select:focus,.rfield textarea:focus{border-color:rgba(201,169,110,.35)}
.rfield select option{background:#0c1520;color:var(--text)}
.rfield textarea{min-height:80px;resize:vertical}
.currency-toggle{display:flex;gap:8px}
.currency-btn{
  flex:1;min-height:var(--touch);border-radius:12px;
  border:1px solid rgba(255,255,255,.08);
  background:rgba(255,255,255,.03);color:var(--text-soft);
  font-weight:700;font-size:14px;
  transition:background .15s,border-color .15s,color .15s;
}
.currency-btn.active{background:rgba(201,169,110,.14);border-color:rgba(201,169,110,.3);color:var(--gold)}
.amount-row{display:flex;gap:10px;align-items:flex-end}
.amount-row .rfield:first-child{flex:1}
.amount-row .rfield:last-child{flex:0 0 130px}

.receipt-month-bar{
  display:flex;align-items:center;justify-content:space-between;gap:10px;
  margin-bottom:14px;flex-wrap:wrap;
}
.receipt-summary-strip{
  background:linear-gradient(135deg,rgba(201,169,110,.1),rgba(201,169,110,.04));
  border:1px solid rgba(201,169,110,.18);
  border-radius:20px;padding:16px 18px;margin-bottom:16px;
  display:grid;grid-template-columns:auto 1fr;gap:12px 20px;align-items:start;
}
.receipt-summary-strip .rs-total{font-size:28px;font-weight:800;color:var(--gold);line-height:1}
.receipt-summary-strip .rs-label{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--text-faint);margin-bottom:4px}
.receipt-summary-strip .rs-cats{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.receipt-month-pills{display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.receipt-month-pills::-webkit-scrollbar{display:none}
.receipt-list{display:grid;gap:10px}
.receipt-card{
  background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,.02));
  border:1px solid rgba(255,255,255,.07);
  border-radius:20px;overflow:hidden;
  cursor:pointer;
  transition:border-color .18s,background .18s;
}
.receipt-card:hover{border-color:rgba(201,169,110,.2);background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.03))}
.receipt-card-row{display:flex;align-items:center;gap:14px;padding:14px 16px}
.receipt-thumb{
  width:56px;height:56px;border-radius:12px;object-fit:cover;

const sheetsSync = {
  async fetchAll() {
    if (!SHEETS_API_URL) return null;
    try {
      const resp = await fetch(`${SHEETS_API_URL}?action=getOrders`);
      const data = await resp.json();
      return data.orders || null;
    } catch(e) {
      console.warn('Sheets fetchAll failed:', e);
      return null;
    }
  },
  async upsert(order) {
    if (!SHEETS_API_URL) return;
    try {
      // Omit signature blob to keep payload small (stored in localStorage)
      const payload = Object.assign({}, order, { signature: order.signature ? '[stored_locally]' : null });
      await fetch(SHEETS_API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({ action: 'upsertOrder', order: payload })
      });
    } catch(e) {
      console.warn('Sheets upsert failed:', e);
    }
  },
  async updateStatus(id, status, deliveredAt, signedBy) {
    if (!SHEETS_API_URL) return;
    try {
      await fetch(SHEETS_API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({ action: 'updateStatus', id, status, deliveredAt, signedBy })
      });

function generateQuoteURL(quote){
  const payload = {
    id: quote.id,
    customerName: quote.customerName,
    items: (quote.items||[]).map(i => ({ title:i.title, sku:i.sku||'', quantity:i.quantity, price:i.price, region:i.region||'' })),
    notes: quote.notes||'',
    createdAt: quote.createdAt,
    expiresAt: quote.expiresAt,
    createdBy: quote.createdBy||'Roberto'
  };
  return QUOTE_BASE_URL + '#' + btoa(unescape(encodeURIComponent(JSON.stringify(payload))));
}

function generateDeliverURL(order){
  const payload = {
    id: order.id,
    customerName: order.customer || order.customerName,
    items: (order.lines||order.items||[]).map(i => ({ title:i.title||i.Name, quantity:i.quantity||i.Quantity })),

function currency(value){
  const num = Number(value || 0);
  return new Intl.NumberFormat('en-KY',{ style:'currency', currency:'KYD', maximumFractionDigits:2 }).format(num);
}
function shortDate(value){
  if(!value) return '—';
  const date = new Date(value);
  if(Number.isNaN(date.getTime())) return value;
  return new Intl.DateTimeFormat('en-KY',{ month:'short', day:'numeric', year:'numeric' }).format(date);
}
function shortDateTime(value){
  if(!value) return '—';
  const date = new Date(value);
  if(Number.isNaN(date.getTime())) return value;
  return new Intl.DateTimeFormat('en-KY',{ month:'short', day:'numeric', hour:'numeric', minute:'2-digit' }).format(date);
}
function escapeHtml(value){
  return String(value ?? '').replace(/[&<>"']/g, ch => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[ch]));
}
function normalize(text){ return String(text || '').toLowerCase().trim(); }
function sum(arr, get = v => v){ return arr.reduce((acc, item) => acc + Number(get(item) || 0), 0); }
function uniq(arr){ return [...new Set(arr)]; }
function readJsonStorage(key, fallback){
  try{ return JSON.parse(localStorage.getItem(key) || JSON.stringify(fallback)); }
  catch{ return fallback; }
}
function writeJsonStorage(key, value){ localStorage.setItem(key, JSON.stringify(value)); }
function getStockBadge(quantity){
  if(quantity <= 0) return { label:'Out', cls:'red' };
  if(quantity <= LOW_STOCK_THRESHOLD) return { label:'Low', cls:'yellow' };
  return { label:'In Stock', cls:'green' };
}
function productType(title){
  const t = normalize(title);
  if(/gin|rum|vodka|tequila|whisk|whisky|bourbon|mezcal|cognac|liqueur|amaro|spirit/.test(t)) return 'spirits';
  if(/ros[eé]|rose/.test(t)) return 'rosé';
  if(/champagne|prosecco|franciacorta|cava|sparkling|brut|saten|cremant|cuvee/.test(t)) return 'sparkling';
  if(/bianco|blanc|vernaccia|gavi|pinot grigio|chardonnay|riesling|sauvignon|white/.test(t)) return 'white';
  if(/rosso|rouge|chianti|nebbiolo|barolo|barbaresco|cabernet|merlot|syrah|pinot noir|sangiovese|malbec|red/.test(t)) return 'red';
  return 'wine';
}
function parseRegion(title){
  const t = String(title || '');
  const regions = ['Toscana','Franciacorta','Provence','Gavi','San Gimignano','Burgundy','Mâcon','Piemonte','Barolo','Chianti','Bolgheri','Veneto','Sicilia','Cayman'];
  return regions.find(region => t.toLowerCase().includes(region.toLowerCase())) || 'Imported Selection';
}
function safeLines(order){ return Array.isArray(order?.Lines) ? order.Lines : []; }
function orderItemCount(order){ return sum(safeLines(order), line => line.Quantity); }
const LOW_STOCK_THRESHOLD = 60;
function lowStockCount(){ return state.data.products.filter(product => Number(product.available || product.totalInventory || 0) > 0 && Number(product.available || product.totalInventory || 0) <= LOW_STOCK_THRESHOLD).length; }
function totalRevenue(){ return sum(state.data.orders, order => order.Total); }
function todayIso(){ return new Date().toISOString(); }
function priceValue(value){
  const num = Number(value);
  return Number.isFinite(num) && num >= 0 ? num : 0;
}
function lineItemTotal(item){ return Math.max(1, Number(item.quantity || 1)) * priceValue(item.price); }
function normalizeDraftItems(items){
  return Array.isArray(items) ? items.map(item => ({
    ...item,
    quantity: Math.max(1, Number(item.quantity || 1)),
    stock: Number(item.stock || 0),
    basePrice: priceValue(item.basePrice ?? item.price),
    price: priceValue(item.price)
  })) : [];
}
function refocusInput(inputId, caret){
  setTimeout(() => {
    const input = document.getElementById(inputId);
    if(!input) return;
    input.focus();
    const pos = typeof caret === 'number' ? caret : input.value.length;
    if(typeof input.setSelectionRange === 'function') input.setSelectionRange(pos, pos);
  }, 0);
}
function linePriceInputId(title){
  const slug = String(title || '').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
  return `price-${slug || 'item'}`;
}

async function sha256(text){
  const data = new TextEncoder().encode(text);
  const hash = await crypto.subtle.digest('SHA-256', data);
  return [...new Uint8Array(hash)].map(byte => byte.toString(16).padStart(2,'0')).join('');
}

function bootstrapNav(){
  const top = tabs.map(tab => {
    const badge = tab.id === 'orders' && state.pendingOrders.length ? `<span class="tab-badge">${state.pendingOrders.length}</span>` : '';
    return `<button class="tab-btn ${state.activeTab === tab.id ? 'active' : ''}" data-tab="${tab.id}" type="button">${escapeHtml(tab.label)} ${badge}</button>`;

    button.addEventListener('click', () => setActiveTab(button.dataset.tab));
  });
}

function setActiveTab(tabId){
  state.activeTab = tabId;
  Object.entries(els.panels).forEach(([id, panel]) => panel.classList.toggle('active', id === tabId));
  bootstrapNav();
  if(tabId === 'new-sale') renderNewSale();
  if(tabId === 'orders'){ renderOrders(); syncCin7OrderStatuses(); }
  if(tabId === 'receipts') renderReceipts();
  updateMobileSaleBar();
}

function hydrateLocalState(){
  state.pendingOrders = readJsonStorage(PENDING_ORDERS_KEY, []);
  // Async: sync from Google Sheets (cross-device orders)
  sheetsSync.fetchAll().then(remoteOrders => {
    if (!remoteOrders || !remoteOrders.length) return;
    let changed = false;
    remoteOrders.forEach(ro => {
      if (!ro.id) return;
      const local = state.pendingOrders.find(o => o.id === ro.id);
      if (local) {
        if (ro.status && ro.status !== local.status) { local.status = ro.status; changed = true; }
        if (ro.deliveredAt && !local.deliveredAt) { local.deliveredAt = ro.deliveredAt; changed = true; }
        if (ro.signedBy && !local.signedBy) { local.signedBy = ro.signedBy; changed = true; }
      } else {
        state.pendingOrders.unshift({
          id: ro.id, createdAt: ro.createdAt, status: ro.status || 'PENDING',
          customer: ro.customer, customerId: ro.customerId || null,
          total: parseFloat(ro.total) || 0, lines: ro.lines || [],
          cin7SaleId: ro.cin7SaleId || null, cin7OrderNumber: ro.cin7OrderNumber || null,
          deliveredAt: ro.deliveredAt || null, signedBy: ro.signedBy || null, signature: null
        });
        changed = true;
      }
    });
    if (changed) { persistPendingOrders(); renderAll(); }
  });
  state.extraCustomers = readJsonStorage(EXTRA_CUSTOMERS_KEY, []);
  const savedDraft = readJsonStorage(DRAFT_SALE_KEY, state.draftSale);
  state.draftSale = {
    customer: savedDraft?.customer || null,
    items: normalizeDraftItems(savedDraft?.items),
    step: savedDraft?.step || 'customer',
    confirmation: savedDraft?.confirmation || null,
    quoteConfirmation: savedDraft?.quoteConfirmation || null,
    quoteStep: savedDraft?.quoteStep || null
  };
  state.receipts = readJsonStorage(RECEIPTS_KEY, []);
  hydrateCustomerNotes();
  hydrateQuotes();
}
function hydrateCustomerNotes(){ state.customerNotes = readJsonStorage(CUSTOMER_NOTES_KEY, {}); }
function persistCustomerNotes(){ writeJsonStorage(CUSTOMER_NOTES_KEY, state.customerNotes); }
function hydrateQuotes(){ state.quotes = readJsonStorage(QUOTES_KEY, {}); }
function persistQuotes(){ writeJsonStorage(QUOTES_KEY, state.quotes); }
function generateQuoteId(){
  const year = new Date().getFullYear();
  const counters = readJsonStorage(QUOTE_COUNTER_KEY, {});
  const next = (counters[year] || 0) + 1;
  counters[year] = next;
  writeJsonStorage(QUOTE_COUNTER_KEY, counters);
  return `Q-${year}-${String(next).padStart(4, '0')}`;
}
function getQuoteStatus(quote){
  if(quote.status === 'accepted') return 'accepted';
  if(quote.status === 'declined') return 'declined';
  if(quote.status === 'expired') return 'expired';
  // Check if still pending but past expiry
  if(quote.status === 'pending' && quote.expiresAt && new Date() > new Date(quote.expiresAt)){
    return 'expired';
  }
  return 'pending';
}
function quoteStatusBadge(status){
  const cls = { pending:'gold', accepted:'green', declined:'red', expired:'gray' }[status] || 'gray';
  const label = status.charAt(0).toUpperCase() + status.slice(1);
  return `<span class="badge ${cls}">${label}</span>`;
}
function persistReceipts(){ writeJsonStorage(RECEIPTS_KEY, state.receipts); }
function persistPendingOrders(){ writeJsonStorage(PENDING_ORDERS_KEY, state.pendingOrders); bootstrapNav(); }

// Sync pending orders with Cin7 to detect Tallyn's approvals
async function syncCin7OrderStatuses(){
  const ordersWithCin7 = state.pendingOrders.filter(o => o.cin7SaleId && o.status !== 'DELIVERED');
  if(!ordersWithCin7.length) return;
  let changed = false;
  for(const order of ordersWithCin7){
    try {
      const resp = await fetch(`${CIN7_API_URL}/sale?ID=${order.cin7SaleId}`, {
        headers: { 'api-auth-accountid': CIN7_ACCOUNT_ID, 'api-auth-applicationkey': CIN7_API_KEY }
      });
      if(!resp.ok) continue;
      const sale = await resp.json();
      const quoteStatus = (sale.Quote && sale.Quote.Status) || '';
      const orderStatus = (sale.Order && sale.Order.Status) || '';
      const prev = order.cin7QuoteStatus;
      order.cin7QuoteStatus = quoteStatus;
      order.cin7OrderStatus = orderStatus;
      // If Tallyn authorised the quote and order is placed, mark ready
      if(quoteStatus === 'AUTHORISED' && order.status === 'PENDING'){
        order.status = 'APPROVED';
        order.approvedAt = new Date().toISOString();
        changed = true;
      }
      // If Cin7 shows ORDERED (fully processed), reflect that
      if(orderStatus === 'AUTHORISED' && order.status === 'APPROVED'){
        order.status = 'READY_FOR_DELIVERY';
        changed = true;
      }
      if(prev !== quoteStatus) changed = true;
    } catch(e){ console.error('Cin7 sync error:', e); }
  }
  if(changed){ persistPendingOrders(); renderOrders(); }
}
function persistExtraCustomers(){ writeJsonStorage(EXTRA_CUSTOMERS_KEY, state.extraCustomers); }
function persistDraftSale(){
  state.draftSale.items = normalizeDraftItems(state.draftSale.items);
  writeJsonStorage(DRAFT_SALE_KEY, state.draftSale);
}

async function loadData(){
  state.loading = true;
  hydrateLocalState();
  const [cin7InventoryRaw, ordersRaw, customersRaw, tasksRaw, activityRaw, cin7StockRaw] = await Promise.all([
    fetch('../7cellars/data/cin7-inventory.json').then(r => r.json()).catch(() => ({ Products:[] })),
    fetch('../7cellars/data/cin7-orders.json').then(r => r.json()).catch(() => ({ SaleList:[] })),
    fetch('../7cellars/data/customers.json').then(r => r.json()).catch(() => []),
    fetch('../7cellars/data/tasks.json').then(r => r.json()).catch(() => []),
    fetch('../7cellars/data/activity.json').then(r => r.json()).catch(() => []),
    fetch(`${CIN7_API_URL}/ref/stock?limit=1000`, {
      headers: { 'api-auth-accountid': CIN7_ACCOUNT_ID, 'api-auth-applicationkey': CIN7_API_KEY }
    }).then(r => r.json()).then(data => {
      // Build stock lookup from live Cin7 stock-on-hand endpoint
      const lookup = {};
      (data.StockOnHand || []).forEach(item => {
        const sku = item.SKU || '';
        if(!lookup[sku]) lookup[sku] = { onHand: 0, available: 0, allocated: 0 };
        lookup[sku].onHand += Number(item.OnHand || 0);
        lookup[sku].available += Number(item.Available || 0);
        lookup[sku].allocated += Number(item.Allocated || 0);
      });
      return { stock: lookup };
    }).catch(() => fetch('../7cellars/data/cin7-stock.json').then(r => r.json()).catch(() => ({ stock:{} })))
  ]);
  const stockLookup = cin7StockRaw?.stock || {};

  const cin7Inventory = cin7InventoryRaw?.Products || [];
  const products = cin7Inventory
    .filter(p => {
      const name = (p.Name || '').toLowerCase();
      const tags = (p.Tags || '').toLowerCase();
      // Exclude cases, clusters, multi-packs, large formats — bottles only
      if (name.includes('cluster') || name.includes(' case') || name.includes('pack')) return false;
      if (tags.includes('3l') || tags.includes('magnum') || tags.includes('jeroboam')) return false;
      return true;
    })
    .map(p => {
      // Strip HTML tags from description for tasting notes
      const rawDesc = p.Description || '';
      const cleanDesc = rawDesc.replace(/<[^>]*>/g, ' ').replace(/\s+/g, ' ').trim();
      const sku = p.SKU || '';
      const soh = stockLookup[sku] || stockLookup[p.Barcode] || stockLookup[p.SKU];
      return {
        title: p.Name || '',
        totalInventory: soh ? soh.available : 0,
        price: String(p.PriceTier2 || p.AverageCost || 0),
        retailPrice: String(p.PriceTier1 || 0),
        inventoryQuantity: soh ? soh.onHand : 0,
        available: soh ? soh.available : 0,
        allocated: soh ? soh.allocated : 0,
        sku: sku,
        productId: p.ID || '',
        brand: p.Brand || '',
        category: p.Category || '',
        description: cleanDesc,
        shortDescription: p.ShortDescription || '',
        costPrice: String(p.AverageCost || 0),
        landedCost: String(p.AdditionalAttribute5 || ''),
        fobCost: String(p.AdditionalAttribute1 || ''),
        freightCost: String(p.AdditionalAttribute2 || ''),
        dutyCost: String(p.AdditionalAttribute3 || ''),
        source: 'cin7'
      };
    });
  const orders = ordersRaw.SaleList || [];
  const customers = await Promise.resolve(customersRaw);
  const tasks = await Promise.resolve(tasksRaw);
  const activity = await Promise.resolve(activityRaw);

  const mergedCustomers = [...customers, ...state.extraCustomers.filter(extra => !customers.some(customer => normalize(customer.name) === normalize(extra.name)))].map(customer => ({
    ...customer,
    totalRevenue: Number(customer.totalRevenue || 0),
    orderCount: Number(customer.orderCount || (Array.isArray(customer.orders) ? customer.orders.length : 0)),
    orders: Array.isArray(customer.orders) ? customer.orders : [],
    extra: !customer.id
  }));

  state.data = {
    products,
    orders,
    customers: mergedCustomers,
    tasks: Array.isArray(tasks) ? tasks : [],
    activity: Array.isArray(activity) ? activity : [],
    cin7Inventory
  };
  state.loading = false;
  ensureDraftCustomerStillExists();
  renderAll();
}

function ensureDraftCustomerStillExists(){
  if(!state.draftSale.customer) return;
  const exists = state.data.customers.some(customer => normalize(customer.name) === normalize(state.draftSale.customer.name));
  if(!exists){
    state.draftSale.customer = null;
    state.draftSale.step = 'customer';
    persistDraftSale();
  }
}

  if(search){

function marginColor(margin){
  if(margin >= 40) return 'success';
  if(margin >= 25) return 'warn';
  return 'danger';
}

function winePriceBlock(product){
  const wholesale = product.priceNumber;
  // Only show cost/margin if cost is genuinely lower than wholesale (not the fallback same value)
  const hasLanded = product.landedCostNumber > 0 && product.landedCostNumber < wholesale;
  const hasRetail = product.retailPriceNumber > 0;
  if(!wholesale) return `<div class="wine-price">${currency(0)}</div><div class="muted small">Wholesale</div>`;

  const retail = hasRetail ? product.retailPriceNumber : wholesale * 1.4;
  const retailLabel = hasRetail ? 'Retail' : 'Est. Retail';

  const marginHtml = hasLanded ? (() => {
    const margin = ((wholesale - product.landedCostNumber) / wholesale) * 100;
    const cls = marginColor(margin);
    return `<span class="margin-badge ${cls}">${margin.toFixed(0)}% margin</span>`;
  })() : '';

  return `
    <div class="wine-price-row">
      <div class="wine-price-col">
        <div class="wine-price-value">${currency(wholesale)}</div>
        <div class="wine-price-label">Wholesale</div>
      </div>
      <div class="wine-price-divider"></div>
      <div class="wine-price-col">
        <div class="wine-price-value retail">${currency(retail)}</div>
        <div class="wine-price-label">${retailLabel}</div>
      </div>
    </div>
    ${marginHtml}
    <div class="wine-price-tap-hint">Tap for full pricing ↗</div>
  `;
}

function showPriceModal(product){
  const wholesale = product.priceNumber;
  if(!wholesale){ return; }
  const hasLanded = product.landedCostNumber > 0 && product.landedCostNumber < wholesale;
  const hasRetail = product.retailPriceNumber > 0;
  const retail = hasRetail ? product.retailPriceNumber : wholesale * 1.4;
  const retailLabel = hasRetail ? 'Retail' : 'Est. Retail';
  const landedCost = product.landedCostNumber;

  const marginWholesale = hasLanded ? ((wholesale - landedCost) / wholesale * 100) : null;
  const marginRetail = hasLanded ? ((retail - landedCost) / retail * 100) : null;

  const html = `
    <div class="price-modal-overlay" id="priceModalOverlay">
      <div class="price-modal">
        <div class="pm-header">
          <div>
            <div class="pm-type">${escapeHtml(product.category || capitalize(product.type === 'wine' ? 'Selection' : product.type))}</div>
            <h3 class="pm-title">${escapeHtml(product.title)}</h3>
          </div>
          <button class="pm-close" id="priceModalClose" type="button">✕</button>
        </div>
        <div class="pm-body">
          <div class="pm-section">
            <div class="pm-section-title">Pricing</div>
            <div class="pm-row">
              <span class="pm-label">Retail</span>
              <span class="pm-value">${currency(retail)}${!hasRetail ? ' <span class="muted small">(est.)</span>' : ''}</span>
            </div>
            <div class="pm-row">
              <span class="pm-label">Wholesale</span>
              <span class="pm-value gold">${currency(wholesale)}</span>
            </div>
            <div class="pm-row" style="border-top:1px solid rgba(255,255,255,.08);padding-top:10px;margin-top:6px">
              <span class="pm-label">Total Landed Cost</span>
              <span class="pm-value">${hasLanded ? currency(landedCost) : '<span class="muted small">Not set</span>'}</span>
            </div>
            ${hasLanded ? `
            <div class="pm-row">
              <span class="pm-label">Margin (wholesale)</span>
              <span class="pm-value"><span class="margin-badge ${marginColor(marginWholesale)}">${marginWholesale.toFixed(1)}%</span></span>
            </div>
            <div class="pm-row">
              <span class="pm-label">Margin (retail)</span>
              <span class="pm-value"><span class="margin-badge ${marginColor(marginRetail)}">${marginRetail.toFixed(1)}%</span></span>
            </div>` : ''}
          </div>
        </div>
      </div>
    </div>
  `;

  // Remove any existing modal
  document.getElementById('priceModalOverlay')?.remove();
  document.body.insertAdjacentHTML('beforeend', html);

  const overlay = document.getElementById('priceModalOverlay');
  document.getElementById('priceModalClose').addEventListener('click', () => overlay.remove());
  overlay.addEventListener('click', event => { if(event.target === overlay) overlay.remove(); });
}

function addProductToDraft(title){
  const product = state.data.products.find(item => item.title === title);
  if(!product) return;
  const price = priceValue(product.price || 0);
  const stock = Number(product.inventoryQuantity || product.totalInventory || 0);
  const existing = state.draftSale.items.find(item => item.title === title);
  if(existing){
    existing.quantity += 12;
    existing.stock = stock;
    if(!Number.isFinite(Number(existing.price))) existing.price = price;
    if(!Number.isFinite(Number(existing.basePrice))) existing.basePrice = price;
  }else{
    state.draftSale.items.push({ title, price, basePrice: price, stock, quantity:12, sku: product.sku || '', productId: product.productId || '' });
  }
  state.draftSale.step = 'review';
  state.draftSale.confirmation = null;
  persistDraftSale();
  renderCatalog();
  renderNewSale();
  updateMobileSaleBar();
}

async function createCin7DraftSale(pending){
  const cin7Headers = {
    'Content-Type': 'application/json',
    'api-auth-accountid': CIN7_ACCOUNT_ID,
    'api-auth-applicationkey': CIN7_API_KEY
  };

  // Step 1: Create sale header (no lines — DEAR API ignores them on POST)
  const saleBody = {
    Customer: pending.customer,
    CustomerID: pending.customerId,
    Status: 'DRAFT',
    Location: 'Main Warehouse',
    PriceTier: 'Tier 2',
    BaseCurrency: 'KYD',
    CustomerCurrency: 'KYD',
    TaxRule: 'Tax Exempt',
    TaxCalculation: 'Exclusive',
    SkipQuote: false
  };
  const saleResp = await fetch(`${CIN7_API_URL}/sale`, {
    method: 'POST',
    headers: cin7Headers,
    body: JSON.stringify(saleBody)
  });
  if(!saleResp.ok){
    const errText = await saleResp.text().catch(() => saleResp.statusText);
    throw new Error(`Cin7 create sale error ${saleResp.status}: ${errText}`);
  }
  const sale = await saleResp.json();
  const saleID = sale.ID || sale.SaleID;

  // Step 2: POST quote lines onto the created sale
  const quoteBody = {
    SaleID: saleID,
    Status: 'DRAFT',
    Lines: pending.lines.map(line => {
      const qty = Number(line.quantity) || 0;
      const price = priceValue(line.price);
      return {
        ProductID: line.productId || '',
        SKU: line.sku || '',
        Name: line.title,
        Quantity: qty,
        Price: price,
        Discount: 0,
        Tax: 0,
        Total: Math.round(qty * price * 100) / 100,
        TaxRule: 'Tax Exempt'
      };
    })
  };
  const quoteResp = await fetch(`${CIN7_API_URL}/sale/quote?SaleID=${saleID}`, {
    method: 'POST',
    headers: cin7Headers,
    body: JSON.stringify(quoteBody)
  });
  if(!quoteResp.ok){
    const errText = await quoteResp.text().catch(() => quoteResp.statusText);
    console.error(`Cin7 quote lines failed: ${errText}`);
    // Sale was created but lines failed — still return the sale so we have the ID
    sale._quoteError = errText;
  }
  return sale;
}

async function submitDraftOrder(){
  if(submitDraftOrder._busy) return;
  if(!state.draftSale.customer || !state.draftSale.items.length) return;
  submitDraftOrder._busy = true;
  const total = state.draftSale.items.reduce((acc, item) => acc + lineItemTotal(item), 0);
  const pending = {
    id: `pending-${Date.now()}`,
    createdAt: todayIso(),
    status: 'PENDING',
    customer: state.draftSale.customer.name,
    customerId: state.draftSale.customer.id || null,
    total,
    lines: state.draftSale.items.map(item => ({ ...item, subtotal: lineItemTotal(item) }))
  };

  // Attempt Cin7 draft sale creation
  try {
    const cin7Response = await createCin7DraftSale(pending);
    pending.cin7SaleId = cin7Response.ID || cin7Response.SaleID || null;
    pending.cin7OrderNumber = cin7Response.OrderNumber || cin7Response.SaleOrderNumber || null;
  } catch(err){
    console.error('Cin7 draft sale failed:', err);
    pending.cin7Failed = true;
    // Notify Tallyn about the failure (non-blocking)
    sendTelegramToTallyn(`⚠️ Cin7 sync failed for order ${pending.id} (${pending.customer}): ${err.message}`);
  }

  state.pendingOrders.unshift(pending);
  persistPendingOrders();
  sheetsSync.upsert(pending); // sync to shared backend (non-blocking)
  // Auto-notify Tallyn via Telegram
  sendTelegramToTallyn(formatOrderText(pending));
  state.draftSale.confirmation = pending;
  state.draftSale.items = [];
  state.draftSale.customer = null;
  state.draftSale.step = 'customer';
  persistDraftSale();
  submitDraftOrder._busy = false;
  renderAll();
}

function formatOrderText(order){

  msg += `Customer: ${order.customer}\n`;

  msg += `Items:\n`;
  order.lines.forEach(line => { msg += `  ${line.quantity} × ${line.title} — $${line.subtotal.toFixed(2)}\n`; });
  msg += `\nTotal: $${order.total.toFixed(2)}\n`;
  msg += `\nOrder ID: ${order.id}`;
  if(order.cin7OrderNumber) msg += `\nCin7 Draft Sale: ${order.cin7OrderNumber}`;
  return msg;
}

function initSendQuote(){
  if(!state.draftSale.customer || !state.draftSale.items.length) return;
  // Show notes step in the Review & Submit panel
  state.draftSale.quoteStep = 'notes';
  state.draftSale.confirmation = null;
  state.draftSale.quoteConfirmation = null;
  persistDraftSale();
  renderNewSale();
}

function createAndSaveQuote(notes){
  if(!state.draftSale.customer || !state.draftSale.items.length) return;
  const id = generateQuoteId();
  const now = new Date();
  const expiresAt = new Date(now.getTime() + 14 * 24 * 60 * 60 * 1000).toISOString();
  const total = state.draftSale.items.reduce((acc, item) => acc + lineItemTotal(item), 0);
  const quote = {
    id,
    status: 'pending',
    customerName: state.draftSale.customer.name,
    customerId: state.draftSale.customer.id || null,
    createdAt: now.toISOString(),
    expiresAt,
    items: state.draftSale.items.map(item => ({
      title: item.title,
      price: priceValue(item.price),
      quantity: Math.max(1, Number(item.quantity || 1)),
      region: parseRegion(item.title)
    })),
    total,
    notes: notes || '',
    createdBy: 'Roberto',
    acceptedAt: null,
    declinedAt: null
  };
  hydrateQuotes();
  state.quotes[id] = quote;
  persistQuotes();
  // Clear draft, show confirmation
  state.draftSale.quoteConfirmation = quote;
  state.draftSale.quoteStep = null;
  state.draftSale.items = [];
  state.draftSale.customer = null;
  state.draftSale.step = 'customer';
  state.draftSale.confirmation = null;
  persistDraftSale();
  renderAll();
}

function renderQuotesSection(search){
  hydrateQuotes();
  const allQuotes = Object.values(state.quotes);
  const filtered = allQuotes.filter(q => !search || normalize(q.customerName).includes(search) || normalize(q.id).includes(search));
  // Sort newest first
  filtered.sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));
  if(!filtered.length && !allQuotes.length) return '';
  return `
    <div style="margin-bottom:18px;">
      <div class="quote-section-header">
        <h3>📄 Quotes</h3>
        <span class="badge blue">${allQuotes.length}</span>
      </div>
      <div style="display:grid;gap:12px;">
        ${filtered.length ? filtered.map(q => {
          const status = getQuoteStatus(q);
          const url = generateQuoteURL(q);
          const isExpanded = state.quoteExpandedId === q.id;
          const waText = encodeURIComponent(`Hi ${q.customerName || 'there'}, here's your wine quote from 7 Cellars: ${url}`);
          const emailSubject = encodeURIComponent('Your Wine Quote from 7 Cellars');
          const emailBody = encodeURIComponent(`Hi ${q.customerName || 'there'},\n\nHere is your wine quote from 7 Cellars:\n\n${url}\n\nBest regards,\n7 Cellars Wine`);
          return `
            <div class="quote-card ${status === 'accepted' ? 'accepted' : ''}" data-quote-id="${escapeHtml(q.id)}">
              <div class="quote-head">
                <div>
                  <h4 class="quote-title">${escapeHtml(q.id)}</h4>
                  <div class="quote-meta">
                    <span>${escapeHtml(q.customerName)}</span>
                    <span>${shortDate(q.createdAt)}</span>
                    <span>${q.items.length} line${q.items.length === 1 ? '' : 's'}</span>
                  </div>
                </div>
                <div style="text-align:right;display:grid;gap:8px;justify-items:end;">
                  ${quoteStatusBadge(status)}
                  <strong style="font-size:18px;">${currency(q.total)}</strong>
                </div>
              </div>
              ${isExpanded ? `
                <div style="margin-top:12px;display:grid;gap:12px;">
                  <div class="pending-lines">
                    ${q.items.map(item => `<div class="pending-line"><span>${item.quantity} × ${escapeHtml(item.title)}</span><strong>${currency(item.price * item.quantity)}</strong></div>`).join('')}
                  </div>

                      <a class="btn btn-send-email btn-sm" href="mailto:?subject=${emailSubject}&body=${emailBody}" target="_blank" rel="noopener">📧 Email</a>

function renderOrders(){
  const search = normalize(state.filters.ordersSearch);

  const statusOrder = { 'PENDING': 1, 'APPROVED': 2, 'READY_FOR_DELIVERY': 3, 'OUT_FOR_DELIVERY': 4, 'DELIVERED': 5 };
  const sortedPending = [...state.pendingOrders].sort((a,b) => {
    const orderA = statusOrder[a.status] || 99;
    const orderB = statusOrder[b.status] || 99;
    if(orderA !== orderB) return orderA - orderB;
    return new Date(b.createdAt) - new Date(a.createdAt);
  });

  const pendingOrders = sortedPending.filter(order => !search || normalize(order.customer).includes(search) || order.lines.some(line => normalize(line.title).includes(search)));
  const liveOrders = state.data.orders.filter(order => !search || normalize(order.Customer).includes(search) || normalize(order.OrderNumber).includes(search) || safeLines(order).some(line => normalize(line.Name).includes(search)));
  const orderedTotal = sum(state.data.orders, order => order.Total);
  const pendingTotal = sum(state.pendingOrders, order => order.total);

  const pendingHtml = pendingOrders.map(order => {
    let statusBadgeHtml = '<span class="badge gold">⏳ Pending Approval</span>';
    let actionButtonHtml = `<div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end;align-items:center"><span class="small muted">Waiting for Tallyn</span><button class="btn btn-soft" type="button" data-delete-pending="${order.id}" style="opacity:0.6;font-size:13px;">🗑️</button></div>`;

    if(order.status === 'APPROVED' || order.status === 'READY_FOR_DELIVERY'){
      statusBadgeHtml = '<span class="badge green">✅ Approved — Ready to Pack</span>';
      actionButtonHtml = `<div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end"><button class="btn btn-soft" type="button" data-out-for-delivery="${order.id}">📦 Pack & Deliver</button><button class="btn btn-soft" type="button" data-delete-pending="${order.id}" style="opacity:0.6;font-size:13px;">🗑️</button></div>`;
    }
    let metaItems = [
      `<span>${shortDateTime(order.createdAt)}</span>`,
      `<span>${order.lines.length} line${order.lines.length === 1 ? '' : 's'}</span>`,
      `<span>${order.lines.reduce((acc, line) => acc + line.quantity, 0)} units</span>`
    ];
    if(order.cin7OrderNumber) metaItems.unshift(`<span style="color:var(--gold);font-weight:600">${escapeHtml(order.cin7OrderNumber)}</span>`);

    if (order.status === 'OUT_FOR_DELIVERY') {
      statusBadgeHtml = '<span class="badge blue">Out for Delivery</span>';
      const deliverUrl = generateDeliverURL(order);
      actionButtonHtml = `<div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end"><button class="btn btn-soft" type="button" data-collect-signature="${order.id}">✍️ Sign Here</button><a class="btn btn-soft" href="${deliverUrl}" target="_blank" rel="noopener" style="text-decoration:none;text-align:center">📱 Open Delivery Page</a></div>`;
      if(order.outForDeliveryAt) metaItems.push(`<span>Departed: ${shortDateTime(order.outForDeliveryAt)}</span>`);
    } else if (order.status === 'DELIVERED') {
      statusBadgeHtml = '<span class="badge green">Delivered</span>';
      actionButtonHtml = `<div style="text-align:right"><div class="gold" style="font-weight:700">✅ Delivered</div><div class="small muted">${shortDateTime(order.deliveredAt)}</div></div>`;
      if(order.signature) actionButtonHtml += `<img src="${order.signature}" class="signature-thumb" data-view-signature="${order.id}">`;
    }

    return `
      <div class="pending-card">
        <div class="pending-head">
          <div>
            <h4 class="pending-title">${escapeHtml(order.customer)}</h4>
            <div class="pending-meta">${metaItems.join('')}</div>
          </div>
          <div style="text-align:right;display:grid;gap:8px;justify-items:end;">
            ${statusBadgeHtml}
            <strong style="font-size:20px;">${currency(order.total)}</strong>
          </div>
        </div>
        <div class="pending-lines">
          ${order.lines.map(line => `<div class="pending-line"><span>${line.quantity} × ${escapeHtml(line.title)}</span><strong>${currency(line.subtotal || (line.quantity * line.price))}</strong></div>`).join('')}
        </div>
        <div style="display:flex;justify-content:flex-end;margin-top:14px;">${actionButtonHtml}</div>
      </div>`;
  }).join('');

  els.panels.orders.innerHTML = `
    <div class="kpi-grid">
      <div class="kpi-card"><div class="label">Pending Orders</div><div class="value">${state.pendingOrders.length}</div><div class="sub">Saved locally and waiting for follow-up.</div></div>
      <div class="kpi-card"><div class="label">Pending Value</div><div class="value">${currency(pendingTotal)}</div><div class="sub">Quick-sale pipeline not yet entered elsewhere.</div></div>
      <div class="kpi-card"><div class="label">Cin7 Orders</div><div class="value">${state.data.orders.length}</div><div class="sub">Historical wholesale orders.</div></div>
      <div class="kpi-card"><div class="label">Cin7 Revenue</div><div class="value">${currency(orderedTotal)}</div><div class="sub">From the current sales dataset.</div></div>
    </div>

    <div class="card">
      <div class="card-header">
        <div>
          <h3>Orders</h3>
          <p>Pending first, then full Cin7 history.</p>
        </div>
        <div class="search" style="max-width:320px;"><input id="ordersSearchInput" type="search" placeholder="Search customer, order, or wine" value="${escapeHtml(state.filters.ordersSearch)}"></div>
      </div>
      <div class="card-body">
        ${renderQuotesSection(search)}
        <div class="pending-wrap">
          ${pendingOrders.length ? pendingHtml : emptyState('🧾','No pending orders','New quick-sale submissions will appear here with a gold pending badge.')}
        </div>
      </div>
    </div>

    <div class="card" style="margin-top:16px;">
      <div class="card-header">
        <div>
          <h3>Cin7 Order History</h3>
          <p>Reference every wholesale order already in the system.</p>
        </div>
      </div>
      <div class="card-body">
        <div class="orders-table-desktop table-wrap">
          <table>
            <thead>
              <tr>
                <th>Order</th>
                <th>Date</th>
                <th>Customer</th>
                <th>Items</th>
                <th>Total</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody>
              ${liveOrders.map(order => `
                <tr>
                  <td><span class="table-title">${escapeHtml(order.OrderNumber)}</span><span class="table-sub">${safeLines(order).length} line${safeLines(order).length === 1 ? '' : 's'}</span></td>
                  <td>${escapeHtml(shortDate(order.OrderDate))}</td>
                  <td>${escapeHtml(order.Customer)}</td>
                  <td>${safeLines(order).slice(0,2).map(line => escapeHtml(`${line.Quantity} × ${line.Name}`)).join('<br>')}${safeLines(order).length > 2 ? `<span class="table-sub">+${safeLines(order).length - 2} more</span>` : ''}</td>
                  <td><strong>${currency(order.Total)}</strong></td>
                  <td>${statusBadge(order.Status)}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
        <div class="orders-cards-mobile">
          ${liveOrders.map(order => `
            <div class="order-card-mobile">
              <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
                <div>
                  <h4 style="margin:0;font-size:15px;font-weight:700">${escapeHtml(order.Customer)}</h4>
                  <p class="muted small" style="margin:4px 0 0">${escapeHtml(order.OrderNumber)} · ${escapeHtml(shortDate(order.OrderDate))}</p>
                </div>
                <div style="text-align:right">
                  <strong style="font-size:17px">${currency(order.Total)}</strong>
                  <div style="margin-top:4px">${statusBadge(order.Status)}</div>
                </div>
              </div>
              <p class="muted small" style="margin:8px 0 0">${safeLines(order).slice(0,2).map(line => escapeHtml(line.Quantity + ' × ' + line.Name)).join(', ')}${safeLines(order).length > 2 ? ' +' + (safeLines(order).length - 2) + ' more' : ''}</p>
            </div>
          `).join('')}
        </div>
      </div>
    </div>
  `;

  const root = els.panels.orders;
  root.querySelector('#ordersSearchInput').addEventListener('input', event => { state.filters.ordersSearch = event.target.value; renderOrders(); });

  // Quote card expand/collapse
  root.querySelectorAll('[data-quote-id]').forEach(card => {
    const qid = card.dataset.quoteId;
    // Only toggle on the card itself, not child links/buttons
    card.addEventListener('click', event => {
      if(event.target.closest('a') || event.target.closest('button')) return;
      state.quoteExpandedId = state.quoteExpandedId === qid ? null : qid;
      renderOrders();
    });
  });

  // Copy quote link in orders tab
  root.querySelectorAll('[data-copy-quote-link-orders]').forEach(btn => btn.addEventListener('click', event => {
    event.stopPropagation();
    const link = btn.dataset.copyQuoteLinkOrders;
    navigator.clipboard.writeText(link).then(() => {
      const orig = btn.textContent;
      btn.textContent = 'Copied!';
      setTimeout(() => { btn.textContent = orig; }, 1800);
    }).catch(() => {});
  }));

  // Delivery Flow Actions
  root.querySelectorAll('[data-out-for-delivery]').forEach(btn => btn.addEventListener('click', () => setOutForDelivery(btn.dataset.outForDelivery)));
  root.querySelectorAll('[data-collect-signature]').forEach(btn => btn.addEventListener('click', () => showSignatureModal(btn.dataset.collectSignature)));
  root.querySelectorAll('[data-view-signature]').forEach(thumb => thumb.addEventListener('click', () => showSignatureLightbox(thumb.dataset.viewSignature)));
  // Delete pending order
  root.querySelectorAll('[data-delete-pending]').forEach(btn => btn.addEventListener('click', () => {
    const id = btn.dataset.deletePending;
    if(!confirm('Delete this pending order?')) return;
    state.pendingOrders = state.pendingOrders.filter(o => o.id !== id);
    persistPendingOrders();
    renderOrders();
  }));
}
