<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>7 Cellars Staff Dashboard</title>
<meta name="theme-color" content="#0D1B2A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="7 Cellars">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.jpg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0D1B2A;
  --bg-2:#0a1522;
  --surface:#070d14;
  --surface-2:#0c1420;
  --surface-3:#111c2b;
  --surface-4:#162336;
  --line:rgba(201,169,110,.18);
  --line-soft:rgba(255,255,255,.08);
  --text:#E4E8EC;
  --text-soft:#8898b0;
  --text-faint:#63758f;
  --gold:#C9A96E;
  --gold-2:#e1c18b;
  --success:#4cc38a;
  --warn:#d3ac54;
  --danger:#d36666;
  --shadow:0 20px 50px rgba(0,0,0,.34);
  --radius:22px;
  --radius-sm:16px;
  --radius-xs:12px;
  --touch:52px;
  --max:1480px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:linear-gradient(180deg,#0D1B2A 0%,#09111a 100%);color:var(--text);font-family:'Inter',system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100%;scroll-behavior:smooth;overscroll-behavior-y:contain}
body{min-height:100vh}
a{color:inherit}
button,input,select{font:inherit}
button{cursor:pointer}
img{max-width:100%;display:block}
.hidden{display:none!important}
.muted{color:var(--text-soft)}
.gold{color:var(--gold)}
.small{font-size:12px}
.app-shell{min-height:100vh;padding-bottom:96px}

.login-screen{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:28px;
  background:
    radial-gradient(circle at top left, rgba(201,169,110,.14), transparent 28%),
    radial-gradient(circle at bottom right, rgba(255,255,255,.05), transparent 30%),
    linear-gradient(180deg, #0D1B2A, #070d14 62%);
}
.login-card{
  width:min(100%,420px);
  background:linear-gradient(180deg,rgba(13,27,42,.92),rgba(7,13,20,.94));
  border:1px solid var(--line);
  border-radius:32px;
  box-shadow:var(--shadow);
  padding:34px 28px 28px;
  position:relative;
  overflow:hidden;
}
.login-card::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(135deg,rgba(201,169,110,.12),transparent 36%,transparent 68%,rgba(201,169,110,.08));
  pointer-events:none;
}
.login-brand{display:flex;flex-direction:column;align-items:center;gap:14px;margin-bottom:24px;text-align:center;position:relative;z-index:1}
.login-brand img{width:74px;height:74px;border-radius:20px;box-shadow:0 12px 24px rgba(0,0,0,.35)}
.login-brand h1{margin:0;font-size:32px;letter-spacing:.02em}
.login-brand p{margin:0;color:var(--text-soft);line-height:1.5}
.login-form{display:grid;gap:14px;position:relative;z-index:1}
.input-shell{
  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.09);
  border-radius:18px;
  padding:14px 16px;
}
.input-shell label{display:block;font-size:12px;text-transform:uppercase;letter-spacing:.12em;color:var(--text-faint);margin-bottom:8px}
.input-shell input{width:100%;border:none;outline:none;background:transparent;color:var(--text);font-size:16px}
.input-shell input::placeholder{color:#6d7c92}
.btn{
  min-height:var(--touch);
  border:none;
  border-radius:16px;
  padding:12px 18px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  font-weight:700;
  letter-spacing:.01em;
  transition:transform .18s ease, box-shadow .18s ease, background .18s ease, color .18s ease, border-color .18s ease;
}
.btn:active{transform:translateY(1px) scale(.995)}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold-2));color:#21170a;box-shadow:0 16px 30px rgba(201,169,110,.22)}
.btn-gold:hover{box-shadow:0 18px 32px rgba(201,169,110,.28)}
.btn-ghost{background:rgba(255,255,255,.03);color:var(--text);border:1px solid rgba(255,255,255,.08)}
.btn-ghost:hover{background:rgba(255,255,255,.06)}
.btn-soft{background:rgba(201,169,110,.12);color:var(--gold);border:1px solid rgba(201,169,110,.25)}
.btn-danger{background:rgba(211,102,102,.12);color:#efb1b1;border:1px solid rgba(211,102,102,.24)}
.login-error{display:none;color:#efb1b1;background:rgba(211,102,102,.12);border:1px solid rgba(211,102,102,.24);padding:12px 14px;border-radius:14px;font-size:13px}
.login-note{font-size:12px;color:var(--text-faint);text-align:center;margin-top:4px}

.pull-indicator{
  position:fixed;
  top:max(10px,env(safe-area-inset-top));
  left:50%;
  transform:translate(-50%,-120%);
  z-index:90;
  background:rgba(7,13,20,.96);
  border:1px solid var(--line);
  border-radius:999px;
  padding:10px 16px;
  display:flex;
  align-items:center;
  gap:10px;
  color:var(--text-soft);
  box-shadow:var(--shadow);
  transition:transform .24s ease, opacity .24s ease;
  opacity:0;
}
.pull-indicator.visible{transform:translate(-50%,0);opacity:1}
.pull-dot{width:10px;height:10px;border-radius:50%;background:var(--gold);box-shadow:0 0 0 6px rgba(201,169,110,.12)}

.header-wrap{position:sticky;top:0;z-index:40;background:rgba(7,13,20,.76);backdrop-filter:blur(18px);border-bottom:1px solid rgba(255,255,255,.04)}
.header-accent{height:2px;background:linear-gradient(90deg,transparent,rgba(201,169,110,.9),transparent)}
.header{
  width:min(calc(100% - 24px),var(--max));
  margin:0 auto;
  padding:10px 0;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:14px;
}
.brand{display:flex;align-items:center;gap:12px;min-width:0}
.brand img{width:42px;height:42px;border-radius:12px;box-shadow:0 10px 26px rgba(0,0,0,.28)}
.brand-copy{min-width:0}
.brand-copy h1{margin:0;font-size:20px;white-space:nowrap}
.brand-copy p{margin:4px 0 0;color:var(--text-soft);font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.header-actions{display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:flex-end}
.header-actions .btn{min-width:var(--touch)}
.desktop-new-sale{padding:8px 14px;min-height:42px;font-size:14px}

.top-tabs-wrap{border-top:1px solid rgba(255,255,255,.03)}
.top-tabs{
  width:min(calc(100% - 24px),var(--max));
  margin:0 auto;
  display:flex;
  gap:10px;
  overflow:auto;
  padding:12px 0 14px;
  scrollbar-width:none;
}
.top-tabs::-webkit-scrollbar{display:none}
.tab-btn{
  border:none;
  background:rgba(255,255,255,.03);
  color:var(--text-soft);
  border:1px solid transparent;
  border-radius:999px;
  min-height:var(--touch);
  padding:10px 18px;
  white-space:nowrap;
  display:inline-flex;
  align-items:center;
  gap:10px;
  font-weight:600;
}
.tab-btn.active{color:var(--text);background:rgba(201,169,110,.12);border-color:rgba(201,169,110,.22);box-shadow:inset 0 0 0 1px rgba(255,255,255,.02)}
.tab-badge{background:rgba(201,169,110,.14);color:var(--gold);padding:2px 8px;border-radius:999px;font-size:11px;font-weight:700}

.main{
  width:min(calc(100% - 24px),var(--max));
  margin:0 auto;
  padding:22px 0 40px;
}
.tab-panel{display:none;animation:panelIn .26s ease;overflow:hidden;max-width:100%}
.tab-panel.active{display:block}
@keyframes panelIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.hero-banner{
  background:
    radial-gradient(circle at top right, rgba(201,169,110,.13), transparent 28%),
    linear-gradient(135deg, rgba(255,255,255,.05), rgba(255,255,255,.02)),
    linear-gradient(180deg, rgba(13,27,42,.92), rgba(7,13,20,.96));
  border:1px solid var(--line);
  border-radius:30px;
  padding:26px;
  box-shadow:var(--shadow);
  display:grid;
  grid-template-columns:1.35fr .95fr;
  gap:18px;
  margin-bottom:18px;
}
.hero-copy h2{margin:0;font-size:30px;line-height:1.06}
.hero-copy p{margin:12px 0 0;color:var(--text-soft);line-height:1.6;max-width:64ch}
.hero-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:20px}
.hero-stats{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;align-content:start}
.hero-stat{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:22px;padding:18px}
.hero-stat .label{font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--text-faint);margin-bottom:8px}
.hero-stat .value{font-size:28px;font-weight:800}
.hero-stat .sub{margin-top:6px;font-size:12px;color:var(--text-soft)}

.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin:18px 0}
.kpi-card{
  background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.025));
  border:1px solid rgba(255,255,255,.07);
  border-radius:24px;
  padding:20px;
  box-shadow:0 14px 32px rgba(0,0,0,.22);
}
.kpi-card .label{font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--text-faint);margin-bottom:10px}
.kpi-card .value{font-size:34px;font-weight:800;line-height:1}
.kpi-card .sub{margin-top:10px;color:var(--text-soft);font-size:13px;line-height:1.45}
.kpi-card.alert .value{color:var(--gold)}

.grid-2{display:grid;grid-template-columns:1.1fr .9fr;gap:16px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.card{
  background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,.02));
  border:1px solid rgba(255,255,255,.07);
  border-radius:26px;
  box-shadow:0 12px 28px rgba(0,0,0,.18);
  overflow:hidden;
}
.card-header{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:18px 20px;border-bottom:1px solid rgba(255,255,255,.06)}
.card-header h3{margin:0;font-size:17px}
.card-header p{margin:3px 0 0;color:var(--text-soft);font-size:13px}
.card-body{padding:18px 20px 20px}
.stack{display:grid;gap:14px}

.activity-list,.customer-list,.task-list,.list-clean{display:grid;gap:12px}
.list-item{
  padding:14px 16px;
  border-radius:18px;
  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.06);
}
.list-item-top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}
.list-item h4{margin:0 0 6px;font-size:15px}
.list-item p{margin:0;color:var(--text-soft);line-height:1.55;font-size:13px}

.table-wrap{overflow:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;min-width:760px}
th,td{text-align:left;padding:14px 12px;border-bottom:1px solid rgba(255,255,255,.06);vertical-align:top}
th{font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--text-faint);font-weight:700}
td{font-size:14px}
tr:nth-child(even) td{background:rgba(255,255,255,.015)}
tr:hover td{background:rgba(201,169,110,.05)}
.table-title{font-weight:700}
.table-sub{display:block;color:var(--text-soft);font-size:12px;margin-top:4px}

.badge{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:999px;font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase}
.badge.gold{background:rgba(201,169,110,.16);color:var(--gold);border:1px solid rgba(201,169,110,.22)}
.badge.green{background:rgba(76,195,138,.14);color:#8fe2b5;border:1px solid rgba(76,195,138,.2)}
.badge.yellow{background:rgba(211,172,84,.14);color:#e7cb90;border:1px solid rgba(211,172,84,.2)}
.badge.red{background:rgba(211,102,102,.14);color:#f0b0b0;border:1px solid rgba(211,102,102,.2)}
.badge.blue{background:rgba(102,157,211,.14);color:#a3caef;border:1px solid rgba(102,157,211,.2)}

.toolbar{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:16px}
.search{flex:1 1 280px;position:relative}
.search input,.select,.text-input,.number-input,.textarea{
  width:100%;
  min-height:var(--touch);
  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.08);
  color:var(--text);
  border-radius:16px;
  padding:12px 14px;
  outline:none;
}
.search input{padding-left:42px}
.search::before{content:"⌕";position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-faint);font-size:18px}
.select{width:auto;min-width:160px;padding-right:40px}
.select option{background:#0c1520;color:var(--text)}
.filter-pills{display:flex;gap:10px;flex-wrap:wrap}
.pill{
  min-height:40px;
  padding:10px 14px;
  border-radius:999px;
  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.06);
  color:var(--text-soft);
  font-weight:600;
}
.pill.active{background:rgba(201,169,110,.12);border-color:rgba(201,169,110,.22);color:var(--text)}

.catalog-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px}
.wine-card{
  padding:18px;
  border-radius:24px;
  background:linear-gradient(180deg,rgba(255,255,255,.045),rgba(255,255,255,.025));
  border:1px solid rgba(255,255,255,.07);
  display:flex;
  flex-direction:column;
  gap:14px;
  min-height:238px;
}
.wine-head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}
.wine-type{font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--text-faint)}
.wine-title{font-size:18px;font-weight:700;line-height:1.35;margin:0}
.wine-meta{display:flex;gap:10px;flex-wrap:wrap;color:var(--text-soft);font-size:12px}
.wine-notes-wrap{display:grid;gap:4px}
.wine-notes{margin:0;font-size:13px;line-height:1.5;color:var(--text-soft)}
.wine-notes-toggle{background:none;border:none;color:var(--gold);font-size:12px;font-weight:600;padding:0;cursor:pointer;text-align:left}
.new-customer-form{padding:4px 0}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;max-width:100%;overflow:hidden}
.form-field{display:grid;gap:4px}
.form-field.full{grid-column:1/-1}
.form-field label{font-size:12px;font-weight:600;color:var(--text-soft)}
.form-field input,.form-field textarea{min-height:var(--touch);background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);color:var(--text);border-radius:12px;padding:10px 14px;outline:none;font:inherit;font-size:14px}
.form-field input:focus,.form-field textarea:focus{border-color:rgba(201,169,110,.3)}
.send-buttons{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.btn-send-wa{background:rgba(37,211,102,.15);border-color:rgba(37,211,102,.3);color:#25d366}
.btn-send-email{background:rgba(66,133,244,.12);border-color:rgba(66,133,244,.25);color:#4285f4}
.wine-price{font-size:26px;font-weight:800;color:var(--gold);line-height:1}
.wine-card .btn-sm{white-space:nowrap}
.stock-meter{height:8px;border-radius:999px;background:rgba(255,255,255,.06);overflow:hidden}
.stock-fill{height:100%;border-radius:999px}
.stock-fill.green{background:linear-gradient(90deg,#2f8f61,#65dba3)}
.stock-fill.yellow{background:linear-gradient(90deg,#b18733,#e0c07a)}
.stock-fill.red{background:linear-gradient(90deg,#9c4343,#da7a7a)}

.sale-layout{display:grid;grid-template-columns:1.25fr .95fr;gap:16px;align-items:start}
.sale-flow{display:grid;gap:16px}
.step-card{border-radius:28px;overflow:hidden}
.step-head{display:flex;justify-content:space-between;gap:12px;align-items:center;padding:18px 20px;border-bottom:1px solid rgba(255,255,255,.06)}
.step-no{display:inline-flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:50%;background:rgba(201,169,110,.14);color:var(--gold);font-weight:800}
.step-title-wrap{display:flex;align-items:center;gap:12px}
.step-title-wrap h3{margin:0;font-size:17px}
.customer-picker,.wine-picker{display:grid;gap:12px}
.selectable-list{display:grid;gap:10px;max-height:360px;overflow:auto;padding-right:4px}
.selectable-item{
  border:1px solid rgba(255,255,255,.07);
  background:rgba(255,255,255,.03);
  border-radius:18px;
  padding:18px 18px;
  display:flex;
  justify-content:space-between;
  gap:12px;
  align-items:center;
}
.selectable-item.active{border-color:rgba(201,169,110,.3);background:rgba(201,169,110,.1)}
.selectable-main{min-width:0}
.selectable-main h4{margin:0 0 6px;font-size:17px}
.selectable-main p{margin:0;color:var(--text-soft);font-size:14px;line-height:1.45}
.selectable-item .btn{padding:10px 14px;min-height:40px}
.order-lines{display:grid;gap:12px;max-height:430px;overflow:auto;padding-right:4px}
.line-item{
  border:1px solid rgba(255,255,255,.07);
  background:rgba(255,255,255,.03);
  border-radius:20px;
  padding:16px;
  display:grid;
  gap:12px;
}
.line-top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}
.line-title{margin:0;font-size:15px;font-weight:700}
.line-sub{margin-top:6px;color:var(--text-soft);font-size:12px}
.qty-controls{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.qty-btn{
  width:56px;height:56px;border-radius:14px;border:1px solid rgba(255,255,255,.08);
  background:rgba(255,255,255,.04);color:var(--text);font-size:26px;display:inline-flex;align-items:center;justify-content:center;
}
.qty-value{min-width:64px;text-align:center;font-weight:800;font-size:24px}
.qty-input{width:80px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:12px;color:var(--text);padding:8px 4px;-moz-appearance:textfield}
.qty-input::-webkit-outer-spin-button,.qty-input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.sale-summary{position:sticky;top:136px}
.summary-totals{display:grid;gap:12px}
.total-row{display:flex;justify-content:space-between;gap:12px;align-items:center;font-size:15px}
.total-row.grand{font-size:22px;font-weight:800;color:var(--gold);padding-top:8px;border-top:1px solid rgba(255,255,255,.08)}
.summary-actions{display:grid;gap:10px;margin-top:18px}
.confirm-card{display:grid;gap:16px;text-align:center}
.confirm-icon{font-size:64px;line-height:1}

.orders-cards-mobile{display:none}
.order-card-mobile{padding:16px;border-radius:20px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);word-break:break-word}
.orders-cards-mobile{display:none;grid-template-columns:1fr;gap:12px}
.pending-wrap{display:grid;gap:14px;margin-bottom:18px}
.pending-card{padding:18px;border-radius:22px;border:1px solid rgba(201,169,110,.25);background:linear-gradient(180deg,rgba(201,169,110,.08),rgba(201,169,110,.04))}
.pending-head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:10px}
.pending-title{margin:0;font-size:17px}
.pending-meta{display:flex;gap:10px;flex-wrap:wrap;color:var(--text-soft);font-size:13px}
.pending-lines{display:grid;gap:8px;margin-top:12px}
.pending-line{display:flex;justify-content:space-between;gap:12px;font-size:13px;color:var(--text-soft)}

.customer-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}
.customer-card{padding:18px;border-radius:24px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);display:grid;gap:14px}
.customer-top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}
.customer-name{margin:0;font-size:17px}
.customer-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.customer-stat{padding:12px;border-radius:16px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.05)}
.customer-stat .label{font-size:11px;text-transform:uppercase;letter-spacing:.11em;color:var(--text-faint);margin-bottom:6px}
.customer-stat .value{font-size:17px;font-weight:700}
.mini-orders{display:grid;gap:10px}
.mini-order{padding:12px 14px;border-radius:16px;background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.05)}

<body>
<div id="pullIndicator" class="pull-indicator" aria-hidden="true">
  <span class="pull-dot"></span>
  <span id="pullIndicatorText">Pull to refresh</span>
</div>

<div id="loginScreen" class="login-screen">

    <div class="login-brand">
      <img src="icon.jpg" alt="7 Cellars logo">
      <div>
        <h1>7 Cellars</h1>

      </div>
    </div>
    <div class="login-form">
      <div class="input-shell">
        <label for="passwordInput">Staff password</label>
        <input id="passwordInput" type="password" placeholder="Enter password" autocomplete="current-password">
      </div>
      <button class="btn btn-gold" id="loginButton" type="button">Enter Dashboard</button>
      <div id="loginError" class="login-error">Incorrect password. Please try again.</div>
      <div class="login-note">Optimized for iPhone and iPad daily sales use.</div>

<div id="appShell" class="app-shell hidden">
  <div class="header-wrap">
    <div class="header-accent"></div>
    <header class="header">
      <div class="brand">
        <img src="icon.jpg" alt="7 Cellars logo">
        <div class="brand-copy">
          <h1>7 Cellars Staff</h1>
        </div>
      </div>
      <div class="header-actions">
        <button class="btn btn-gold desktop-new-sale" type="button" data-open-sale>✦ New Sale</button>
      </div>
    </header>
    <div class="top-tabs-wrap">
      <nav class="top-tabs" id="topTabs"></nav>
    </div>
  </div>

  <main class="main">
    <section id="panel-overview" class="tab-panel active"></section>
    <section id="panel-catalog" class="tab-panel"></section>
    <section id="panel-new-sale" class="tab-panel"></section>
    <section id="panel-orders" class="tab-panel"></section>
    <section id="panel-customers" class="tab-panel"></section>
    <section id="panel-tasks" class="tab-panel"></section>
    <section id="panel-receipts" class="tab-panel"></section>
  </main>

  <button class="fab" type="button" aria-label="Create new sale" data-open-sale>+</button>

  <nav class="mobile-bottom-nav" id="mobileBottomNav"></nav>
</div>

<script>
const PASSWORD_HASH = '68e5f9dd988d6c20319da2838813f63b3b9f7926231ad1897da400a6d8023923';
const AUTH_KEY = '7c_staff_auth';
const PENDING_ORDERS_KEY = '7c_pending_orders';
const EXTRA_CUSTOMERS_KEY = '7c_extra_customers';
const DRAFT_SALE_KEY = '7c_sale_draft';
const RECEIPTS_KEY = '7c_receipts';
const RECEIPTS_USER_KEY = '7c_receipts_user';
const tabs = [
  { id:'overview', label:'Home', icon:'⌂' },
  { id:'catalog', label:'Wine Catalog', icon:'🍷' },
  { id:'new-sale', label:'New Sale', icon:'✦' },
  { id:'orders', label:'Orders', icon:'🧾' },
  { id:'customers', label:'Customers', icon:'👥' },
  { id:'tasks', label:'Tasks', icon:'☑' },
  { id:'receipts', label:'Receipts', icon:'📷' }
];

const state = {
  activeTab: 'overview',
  loading: false,
  refreshing: false,
  data: {
    products: [],
    orders: [],
    customers: [],
    tasks: [],
    activity: [],

    cin7Inventory: []
  },
  pendingOrders: [],
  extraCustomers: [],
  draftSale: {
    customer: null,
    items: [],
    step: 'customer',
    confirmation: null
  },
  filters: {
    catalogSearch: '',
    catalogType: 'all',
    catalogSort: 'name',
    customerSearch: '',
    ordersSearch: '',
    newSaleCustomerSearch: '',
    newSaleWineSearch: ''
  },
  pull: {
    startY: 0,
    engaged: false,
    ready: false
  },
  taskSections: {
    todo: true,
    progress: true,
    done: true
  },
  activeTaskColumn: 'todo',
  taskAssigneeFilter: '',
  showNewCustomerForm: false,
  showCustomerRequestForm: false,
  lastCustomerRequest: null,
  lastCustTabRequest: null,
  receipts: [],
  receiptsMonth: '',
  receiptExpanded: null,
  receiptImagePreview: null
};

const els = {
  loginScreen: document.getElementById('loginScreen'),
  appShell: document.getElementById('appShell'),
  passwordInput: document.getElementById('passwordInput'),
  loginButton: document.getElementById('loginButton'),
  loginError: document.getElementById('loginError'),
  topTabs: document.getElementById('topTabs'),
  mobileBottomNav: document.getElementById('mobileBottomNav'),
  pullIndicator: document.getElementById('pullIndicator'),
  pullIndicatorText: document.getElementById('pullIndicatorText'),
  panels: Object.fromEntries(tabs.map(tab => [tab.id, document.getElementById(`panel-${tab.id}`)]))
};

function currency(value){
  const num = Number(value || 0);
  return new Intl.NumberFormat('en-KY',{ style:'currency', currency:'KYD', maximumFractionDigits:2 }).format(num);
}
function shortDate(value){
  if(!value) return '—';
  const date = new Date(value);
  if(Number.isNaN(date.getTime())) return value;
  return new Intl.DateTimeFormat('en-KY',{ month:'short', day:'numeric', year:'numeric' }).format(date);
}
function shortDateTime(value){
  if(!value) return '—';
  const date = new Date(value);
  if(Number.isNaN(date.getTime())) return value;
  return new Intl.DateTimeFormat('en-KY',{ month:'short', day:'numeric', hour:'numeric', minute:'2-digit' }).format(date);
}
function escapeHtml(value){
  return String(value ?? '').replace(/[&<>"']/g, ch => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[ch]));
}
function normalize(text){ return String(text || '').toLowerCase().trim(); }
function sum(arr, get = v => v){ return arr.reduce((acc, item) => acc + Number(get(item) || 0), 0); }
function uniq(arr){ return [...new Set(arr)]; }
function readJsonStorage(key, fallback){
  try{ return JSON.parse(localStorage.getItem(key) || JSON.stringify(fallback)); }
  catch{ return fallback; }
}
function writeJsonStorage(key, value){ localStorage.setItem(key, JSON.stringify(value)); }
function getStockBadge(quantity){
  if(quantity <= 0) return { label:'Out', cls:'red' };
  if(quantity <= 24) return { label:'Low', cls:'yellow' };
  return { label:'In Stock', cls:'green' };
}
function productType(title){
  const t = normalize(title);
  if(/gin|rum|vodka|tequila|whisk|whisky|bourbon|mezcal|cognac|liqueur|amaro|spirit/.test(t)) return 'spirits';
  if(/ros[eé]|rose/.test(t)) return 'rosé';
  if(/champagne|prosecco|franciacorta|cava|sparkling|brut|saten|cremant|cuvee/.test(t)) return 'sparkling';
  if(/bianco|blanc|vernaccia|gavi|pinot grigio|chardonnay|riesling|sauvignon|white/.test(t)) return 'white';
  if(/rosso|rouge|chianti|nebbiolo|barolo|barbaresco|cabernet|merlot|syrah|pinot noir|sangiovese|malbec|red/.test(t)) return 'red';
  return 'wine';
}
function parseRegion(title){
  const t = String(title || '');
  const regions = ['Toscana','Franciacorta','Provence','Gavi','San Gimignano','Burgundy','Mâcon','Piemonte','Barolo','Chianti','Bolgheri','Veneto','Sicilia','Cayman'];
  return regions.find(region => t.toLowerCase().includes(region.toLowerCase())) || 'Imported Selection';
}
function safeLines(order){ return Array.isArray(order?.Lines) ? order.Lines : []; }
function orderItemCount(order){ return sum(safeLines(order), line => line.Quantity); }
function lowStockCount(){ return state.data.products.filter(product => Number(product.inventoryQuantity || product.totalInventory || 0) > 0 && Number(product.inventoryQuantity || product.totalInventory || 0) <= 24).length; }
function totalRevenue(){ return sum(state.data.orders, order => order.Total); }
function todayIso(){ return new Date().toISOString(); }
function priceValue(value){
  const num = Number(value);
  return Number.isFinite(num) && num >= 0 ? num : 0;
}
function lineItemTotal(item){ return Math.max(1, Number(item.quantity || 1)) * priceValue(item.price); }
function normalizeDraftItems(items){
  return Array.isArray(items) ? items.map(item => ({
    ...item,
    quantity: Math.max(1, Number(item.quantity || 1)),
    stock: Number(item.stock || 0),
    basePrice: priceValue(item.basePrice ?? item.price),
    price: priceValue(item.price)
  })) : [];
}
function refocusInput(inputId, caret){
  setTimeout(() => {
    const input = document.getElementById(inputId);
    if(!input) return;
    input.focus();
    const pos = typeof caret === 'number' ? caret : input.value.length;
    if(typeof input.setSelectionRange === 'function') input.setSelectionRange(pos, pos);
  }, 0);
}
function linePriceInputId(title){
  const slug = String(title || '').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
  return `price-${slug || 'item'}`;
}

async function sha256(text){
  const data = new TextEncoder().encode(text);
  const hash = await crypto.subtle.digest('SHA-256', data);
  return [...new Uint8Array(hash)].map(byte => byte.toString(16).padStart(2,'0')).join('');
}

function bootstrapNav(){
  const top = tabs.map(tab => {
    const badge = tab.id === 'orders' && state.pendingOrders.length ? `<span class="tab-badge">${state.pendingOrders.length}</span>` : '';
    return `<button class="tab-btn ${state.activeTab === tab.id ? 'active' : ''}" data-tab="${tab.id}" type="button">${escapeHtml(tab.label)} ${badge}</button>`;
  }).join('');
  const mobile = tabs.map(tab => {
    const badge = tab.id === 'orders' && state.pendingOrders.length ? `<span class="tab-badge">${state.pendingOrders.length}</span>` : '';
    return `<button class="mobile-nav-btn ${state.activeTab === tab.id ? 'active' : ''}" data-tab="${tab.id}" type="button"><span class="icon">${tab.icon}</span><span>${escapeHtml(tab.label)}</span>${badge}</button>`;
  }).join('');
  els.topTabs.innerHTML = top;
  els.mobileBottomNav.innerHTML = mobile;
  [...els.topTabs.querySelectorAll('[data-tab]'), ...els.mobileBottomNav.querySelectorAll('[data-tab]')].forEach(button => {
    button.addEventListener('click', () => setActiveTab(button.dataset.tab));
  });
}

function setActiveTab(tabId){
  state.activeTab = tabId;
  Object.entries(els.panels).forEach(([id, panel]) => panel.classList.toggle('active', id === tabId));
  bootstrapNav();
  if(tabId === 'new-sale') renderNewSale();
  if(tabId === 'orders') renderOrders();
  if(tabId === 'receipts') renderReceipts();
}

function hydrateLocalState(){
  state.pendingOrders = readJsonStorage(PENDING_ORDERS_KEY, []);
  state.extraCustomers = readJsonStorage(EXTRA_CUSTOMERS_KEY, []);
  const savedDraft = readJsonStorage(DRAFT_SALE_KEY, state.draftSale);
  state.draftSale = {
    customer: savedDraft?.customer || null,
    items: normalizeDraftItems(savedDraft?.items),
    step: savedDraft?.step || 'customer',
    confirmation: savedDraft?.confirmation || null
  };
  state.receipts = readJsonStorage(RECEIPTS_KEY, []);
}
function persistReceipts(){ writeJsonStorage(RECEIPTS_KEY, state.receipts); }
function persistPendingOrders(){ writeJsonStorage(PENDING_ORDERS_KEY, state.pendingOrders); bootstrapNav(); }
function persistExtraCustomers(){ writeJsonStorage(EXTRA_CUSTOMERS_KEY, state.extraCustomers); }
function persistDraftSale(){
  state.draftSale.items = normalizeDraftItems(state.draftSale.items);
  writeJsonStorage(DRAFT_SALE_KEY, state.draftSale);
}

async function loadData(){
  state.loading = true;
  hydrateLocalState();
  const [cin7InventoryRaw, ordersRaw, customersRaw, tasksRaw, activityRaw, cin7StockRaw] = await Promise.all([
    fetch('../7cellars/data/cin7-inventory.json').then(r => r.json()).catch(() => ({ Products:[] })),
    fetch('../7cellars/data/cin7-orders.json').then(r => r.json()).catch(() => ({ SaleList:[] })),
    fetch('../7cellars/data/customers.json').then(r => r.json()).catch(() => []),
    fetch('../7cellars/data/tasks.json').then(r => r.json()).catch(() => []),
    fetch('../7cellars/data/activity.json').then(r => r.json()).catch(() => []),
    fetch('../7cellars/data/cin7-stock.json').then(r => r.json()).catch(() => ({ stock:{} }))
  ]);
  const stockLookup = cin7StockRaw?.stock || {};

  const cin7Inventory = cin7InventoryRaw?.Products || [];
  const products = cin7Inventory
    .filter(p => {
      const name = (p.Name || '').toLowerCase();
      const tags = (p.Tags || '').toLowerCase();
      // Exclude cases, clusters, multi-packs, large formats — bottles only
      if (name.includes('cluster') || name.includes(' case') || name.includes('pack')) return false;
      if (tags.includes('3l') || tags.includes('magnum') || tags.includes('jeroboam')) return false;
      return true;
    })
    .map(p => {
      // Strip HTML tags from description for tasting notes
      const rawDesc = p.Description || '';
      const cleanDesc = rawDesc.replace(/<[^>]*>/g, ' ').replace(/\s+/g, ' ').trim();
      const sku = p.SKU || '';
      const soh = stockLookup[sku] || stockLookup[p.Barcode] || stockLookup[p.SKU];
      return {
        title: p.Name || '',
        totalInventory: soh ? soh.available : 0,
        price: String(p.PriceTier2 || p.AverageCost || 0),
        retailPrice: String(p.PriceTier1 || 0),
        inventoryQuantity: soh ? soh.onHand : 0,
        available: soh ? soh.available : 0,
        allocated: soh ? soh.allocated : 0,
        sku: sku,
        brand: p.Brand || '',
        category: p.Category || '',
        description: cleanDesc,
        shortDescription: p.ShortDescription || '',
        source: 'cin7'
      };
    });
  const orders = ordersRaw.SaleList || [];
  const customers = await Promise.resolve(customersRaw);
  const tasks = await Promise.resolve(tasksRaw);
  const activity = await Promise.resolve(activityRaw);

  const mergedCustomers = [...customers, ...state.extraCustomers.filter(extra => !customers.some(customer => normalize(customer.name) === normalize(extra.name)))].map(customer => ({
    ...customer,
    totalRevenue: Number(customer.totalRevenue || 0),
    orderCount: Number(customer.orderCount || (Array.isArray(customer.orders) ? customer.orders.length : 0)),
    orders: Array.isArray(customer.orders) ? customer.orders : [],
    extra: !customer.id
  }));

  state.data = {
    products,
    orders,
    customers: mergedCustomers,
    tasks: Array.isArray(tasks) ? tasks : [],
    activity: Array.isArray(activity) ? activity : [],
    cin7Inventory
  };
  state.loading = false;
  ensureDraftCustomerStillExists();
  renderAll();
}

function ensureDraftCustomerStillExists(){
  if(!state.draftSale.customer) return;
  const exists = state.data.customers.some(customer => normalize(customer.name) === normalize(state.draftSale.customer.name));
  if(!exists){
    state.draftSale.customer = null;
    state.draftSale.step = 'customer';
    persistDraftSale();
  }
}

function renderCatalog(){
  const search = normalize(state.filters.catalogSearch);
  const type = state.filters.catalogType;
  const sort = state.filters.catalogSort;
  let products = state.data.products.map(product => ({
    ...product,
    qty: Number(product.inventoryQuantity || product.totalInventory || 0),
    priceNumber: Number(product.price || 0),
    type: productType(product.title),
    region: parseRegion(product.title)
  }));

  if(search){
    products = products.filter(product => normalize(product.title).includes(search) || normalize(product.region).includes(search) || normalize(product.type).includes(search) || normalize(product.brand || '').includes(search) || normalize(product.sku || '').includes(search) || normalize(product.category || '').includes(search) || normalize(product.shortDescription || '').includes(search));
  }
  if(type !== 'all'){
    products = products.filter(product => product.type === type || (type === 'red' && product.type === 'wine' && /rosso|red/.test(normalize(product.title))) || (type === 'white' && product.type === 'wine' && /white|bianco/.test(normalize(product.title))));
  }
  products.sort((a,b) => {
    if(sort === 'price') return a.priceNumber - b.priceNumber;
    if(sort === 'stock') return a.qty - b.qty;
    return a.title.localeCompare(b.title);
  });

  els.panels.catalog.innerHTML = `

  root.querySelectorAll('[data-type]').forEach(button => button.addEventListener('click', () => { state.filters.catalogType = button.dataset.type; renderCatalog(); }));
  root.querySelectorAll('[data-add-product]').forEach(button => button.addEventListener('click', () => quickAddProduct(button.dataset.addProduct)));
  root.querySelectorAll('[data-toggle-notes]').forEach(button => button.addEventListener('click', () => {

function selectCustomer(name){
  const customer = state.data.customers.find(item => normalize(item.name) === normalize(name));
  if(!customer) return;
  state.draftSale.customer = { name: customer.name, id: customer.id || null, lastOrderDate: customer.lastOrderDate || '' };
  state.draftSale.step = 'wines';
  state.draftSale.confirmation = null;
  persistDraftSale();
  renderNewSale();
}

function requestNewCustomer(){
  state.showNewCustomerForm = true;
  renderNewSale();
}

function formatCustomerRequestText(data){
  let msg = `🆕 New Wholesale Account Request\n\n`;
  msg += `Business: ${data.businessName}\n`;
  if(data.contactName) msg += `Contact: ${data.contactName}\n`;
  if(data.phone) msg += `Phone: ${data.phone}\n`;
  if(data.email) msg += `Email: ${data.email}\n`;
  if(data.address) msg += `Address: ${data.address}\n`;
  if(data.licenseNumber) msg += `License #: ${data.licenseNumber}\n`;
  if(data.paymentTerms) msg += `Terms: ${data.paymentTerms}\n`;
  if(data.notes) msg += `Notes: ${data.notes}\n`;
  msg += `\nRequested: ${new Date().toLocaleDateString()}`;
  return msg;
}

function sendToTallyn(type, text){
  const TALLYN_PHONE = '13453232610';
  const TALLYN_EMAIL = 'tallyn@7cellars.ky';
  if(type === 'whatsapp'){
    window.open(`https://wa.me/${TALLYN_PHONE}?text=${encodeURIComponent(text)}`, '_blank');
  } else {
    const subject = text.includes('Order') ? '7 Cellars — New Wholesale Order' : '7 Cellars — New Account Request';
    window.open(`mailto:${TALLYN_EMAIL}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(text)}`, '_blank');
  }
}

function submitCustomerRequest(){
  const form = document.getElementById('newCustomerForm');
  if(!form) return;
  const data = {
    businessName: form.querySelector('[name="bizName"]').value.trim(),
    contactName: form.querySelector('[name="contactName"]').value.trim(),
    phone: form.querySelector('[name="phone"]').value.trim(),
    email: form.querySelector('[name="email"]').value.trim(),
    address: form.querySelector('[name="address"]').value.trim(),
    licenseNumber: form.querySelector('[name="license"]').value.trim(),
    paymentTerms: form.querySelector('[name="terms"]').value.trim(),
    notes: form.querySelector('[name="notes"]').value.trim(),
    requestedBy: 'Staff App',
    requestedAt: new Date().toISOString()
  };
  if(!data.businessName){ alert('Business name is required'); return; }
  const requests = JSON.parse(localStorage.getItem('7c_customer_requests') || '[]');
  requests.unshift(data);
  localStorage.setItem('7c_customer_requests', JSON.stringify(requests));
  state.showNewCustomerForm = false;
  state.lastCustomerRequest = data;
  renderNewSale();
}

function cancelCustomerRequest(){
  state.showNewCustomerForm = false;
  renderNewSale();
}

function quickAddProduct(title){
  if(!state.draftSale.customer){
    setActiveTab('new-sale');
    addProductToDraft(title);
    return;
  }
  addProductToDraft(title);
  setActiveTab('new-sale');
}

function addProductToDraft(title){
  const product = state.data.products.find(item => item.title === title);
  if(!product) return;
  const price = priceValue(product.price || 0);
  const stock = Number(product.inventoryQuantity || product.totalInventory || 0);
  const existing = state.draftSale.items.find(item => item.title === title);
  if(existing){
    existing.quantity += 12;
    existing.stock = stock;
    if(!Number.isFinite(Number(existing.price))) existing.price = price;
    if(!Number.isFinite(Number(existing.basePrice))) existing.basePrice = price;
  }else{
    state.draftSale.items.push({ title, price, basePrice: price, stock, quantity:12 });
  }
  state.draftSale.step = 'review';
  state.draftSale.confirmation = null;
  persistDraftSale();
  renderCatalog();
  renderNewSale();
}

function changeDraftQuantity(title, delta){
  const item = state.draftSale.items.find(line => line.title === title);
  if(!item) return;
  item.quantity = Math.max(1, Number(item.quantity || 1) + delta);
  state.draftSale.confirmation = null;
  persistDraftSale();
  renderNewSale();
}
function setDraftQuantity(title, qty){
  const item = state.draftSale.items.find(line => line.title === title);
  if(!item) return;
  item.quantity = Math.max(1, Math.round(qty) || 1);
  state.draftSale.confirmation = null;
  persistDraftSale();
  renderNewSale();
}
function updateDraftPrice(title, value){
  const item = state.draftSale.items.find(line => line.title === title);
  if(!item) return;
  item.price = priceValue(value);
  state.draftSale.confirmation = null;
  persistDraftSale();
  renderNewSale();
  refocusInput(linePriceInputId(title));
}
function removeDraftLine(title){
  state.draftSale.items = state.draftSale.items.filter(item => item.title !== title);
  state.draftSale.confirmation = null;
  persistDraftSale();
  renderNewSale();
}
function clearDraftSale(){
  state.draftSale = { customer:null, items:[], step:'customer', confirmation:null };
  persistDraftSale();
  renderNewSale();
}
function startFreshSale(){
  clearDraftSale();
  setActiveTab('new-sale');
}

function submitDraftOrder(){
  if(!state.draftSale.customer || !state.draftSale.items.length) return;
  const total = state.draftSale.items.reduce((acc, item) => acc + lineItemTotal(item), 0);
  const pending = {
    id: `pending-${Date.now()}`,
    createdAt: todayIso(),
    status: 'PENDING',
    customer: state.draftSale.customer.name,
    customerId: state.draftSale.customer.id || null,
    total,
    lines: state.draftSale.items.map(item => ({ ...item, subtotal: lineItemTotal(item) }))
  };
  state.pendingOrders.unshift(pending);
  persistPendingOrders();
  state.draftSale.confirmation = pending;
  state.draftSale.items = [];
  state.draftSale.customer = null;
  state.draftSale.step = 'customer';
  persistDraftSale();
  renderAll();
}

function formatOrderText(order){
  let msg = `📋 New Wholesale Order\n\n`;
  msg += `Customer: ${order.customer}\n`;
  msg += `Date: ${new Date(order.createdAt).toLocaleDateString()}\n\n`;
  msg += `Items:\n`;
  order.lines.forEach(line => { msg += `  ${line.quantity} × ${line.title} — $${line.subtotal.toFixed(2)}\n`; });
  msg += `\nTotal: $${order.total.toFixed(2)}\n`;
  msg += `\nOrder ID: ${order.id}`;
  return msg;
}

function renderTaskCards(items, columnKey){
  if(!items.length) return emptyState('🥂','No tasks here','Everything is clear in this lane.');
  return items.map(task => {
    const moveOptions = columnKey === 'todo'
      ? `<button class="btn btn-sm" data-move-task="${escapeHtml(task.title)}" data-to="In Progress">→ In Progress</button>`
      : columnKey === 'progress'
      ? `<button class="btn btn-sm" data-move-task="${escapeHtml(task.title)}" data-to="Done">✓ Done</button><button class="btn btn-sm btn-muted" data-move-task="${escapeHtml(task.title)}" data-to="To Do">← To Do</button>`
      : `<button class="btn btn-sm btn-muted" data-move-task="${escapeHtml(task.title)}" data-to="In Progress">← Reopen</button>`;
    return `
      <article class="kanban-task">
        <div style="display:flex;justify-content:space-between;gap:10px;align-items:flex-start;">
          <h4>${escapeHtml(task.title)}</h4>
          ${priorityBadge(task.priority)}
        </div>
        <p>${escapeHtml(task.description || 'No extra detail provided.')}</p>
        <div class="kanban-meta">
          <span class="badge blue">${escapeHtml(task.board || 'General')}</span>
          <span class="badge green">${escapeHtml(task.assignee || 'Unassigned')}</span>
          ${task.dueDate ? `<span class="badge yellow">Due ${escapeHtml(shortDate(task.dueDate))}</span>` : ''}
        </div>
        <div class="kanban-actions">${moveOptions}</div>
      </article>
    `;
  }).join('');
}

function renderTasks(){

  const filteredTasks = af ? state.data.tasks.filter(t => (t.assignee || 'Unassigned') === af) : state.data.tasks;

    { key:'todo', title:'To Do', matcher: task => normalize(task.status) === 'todo' },

  const activeCol = state.activeTaskColumn || 'todo';

        <!-- Mobile: Trello-style tabs -->
        <div class="kanban-tabs">
          ${columns.map(column => {
            const count = filteredTasks.filter(column.matcher).length;
            return `<button class="kanban-tab ${column.key === activeCol ? 'active' : ''}" data-task-tab="${column.key}" type="button">${column.title}<span class="tab-count">${count}</span></button>`;
          }).join('')}

        <div class="kanban-swipe">
          <div class="kanban-col">
            <div class="kanban-body">
              ${renderTaskCards(activeItems, activeCol)}

          </div>
        </div>

        <div class="kanban">
          ${columns.map(column => {
            const items = filteredTasks.filter(column.matcher);
            return `
              <div class="kanban-col" data-column="${column.key}" data-collapsed="${state.taskSections[column.key] ? 'false' : 'true'}">
                <button class="kanban-toggle" type="button" data-toggle-column="${column.key}" aria-expanded="${state.taskSections[column.key] ? 'true' : 'false'}">

/* ── Image compression helper ──────────────────────────────── */
function compressImage(file, maxWidth){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = reject;
    reader.onload = event => {
      const img = new Image();
      img.onerror = reject;
      img.onload = () => {
        const ratio = Math.min(1, maxWidth / img.width);
        const canvas = document.createElement('canvas');
        canvas.width = Math.round(img.width * ratio);
        canvas.height = Math.round(img.height * ratio);
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        resolve(canvas.toDataURL('image/jpeg', 0.72));
      };
      img.src = event.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function getReceiptMonths(){
  const months = new Set(state.receipts.map(r => r.date ? r.date.slice(0,7) : null).filter(Boolean));
  const now = new Date();
  for(let i = 0; i < 4; i++){
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    months.add(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`);
  }
  return [...months].sort().reverse();
}

function receiptMonthLabel(ym){
  if(!ym) return 'All';
  const [y, m] = ym.split('-');
  return new Intl.DateTimeFormat('en', { month:'long', year:'numeric' }).format(new Date(Number(y), Number(m)-1, 1));
}

function emptyState(emoji, title, body){
  return `<div class="empty-state"><div class="emoji">${emoji}</div><h4>${escapeHtml(title)}</h4><p>${escapeHtml(body)}</p></div>`;
}
function capitalize(value){ return value ? value.charAt(0).toUpperCase() + value.slice(1) : ''; }
function priorityBadge(priority){
  const level = normalize(priority || 'medium');
  const cls = level === 'high' ? 'red' : level === 'low' ? 'green' : 'yellow';
  return `<span class="badge ${cls}">${escapeHtml(level || 'medium')}</span>`;
}
function statusBadge(status){
  const value = normalize(status || 'pending');
  const cls = /complete|fulfilled|paid/.test(value) ? 'green' : /cancel/.test(value) ? 'red' : /order/.test(value) ? 'gold' : 'blue';
  return `<span class="badge ${cls}">${escapeHtml(status || 'Pending')}</span>`;
}

function bindGlobalPanelActions(root){
  root.querySelectorAll('[data-open-sale]').forEach(button => button.addEventListener('click', startFreshSale));
  root.querySelectorAll('[data-go-tab]').forEach(button => button.addEventListener('click', () => setActiveTab(button.dataset.goTab)));
}

async function tryLogin(){
  const value = els.passwordInput.value;
  const hashed = await sha256(value);
  if(hashed === PASSWORD_HASH){
    localStorage.setItem(AUTH_KEY, 'true');
    els.loginError.style.display = 'none';
    showApp();
    return;
  }
  els.loginError.style.display = 'block';
}
function showApp(){
  els.loginScreen.classList.add('hidden');
  els.appShell.classList.remove('hidden');
  if(!state.data.products.length) loadData().catch(handleLoadError);
}
function logout(){
  localStorage.removeItem(AUTH_KEY);
  els.appShell.classList.add('hidden');
  els.loginScreen.classList.remove('hidden');
  els.passwordInput.value = '';
}

async function refreshData(){
  if(state.refreshing) return;
  state.refreshing = true;
  flashPull('Reloading…');
  location.reload();
}
function handleLoadError(error){
  console.error(error);
  Object.values(els.panels).forEach(panel => panel.innerHTML = emptyState('🍷','Unable to load dashboard data','Check the local data files and refresh the page.'));
}

function setupInteractions(){
  els.loginButton.addEventListener('click', tryLogin);
  els.passwordInput.addEventListener('keydown', event => { if(event.key === 'Enter') tryLogin(); });
  document.querySelectorAll('[data-open-sale]').forEach(button => button.addEventListener('click', startFreshSale));
  setupPullToRefresh();
}

  document.querySelectorAll('[data-open-sale]').forEach(button => button.addEventListener('click', startFreshSale));
}

function getScrollTop(){ return Math.max(0, window.scrollY || window.pageYOffset || document.documentElement.scrollTop || 0); }
function setupPullToRefresh(){
  let lastY = 0;
  window.addEventListener('touchstart', event => {
    if(getScrollTop() > 5) return;
    state.pull.startY = event.touches[0].clientY;
    state.pull.engaged = true;
    state.pull.ready = false;
  }, { passive:true });
  window.addEventListener('touchmove', event => {
    if(!state.pull.engaged || state.refreshing) return;
    lastY = event.touches[0].clientY;
    const delta = lastY - state.pull.startY;
    if(delta > 12 && getScrollTop() <= 5){
      els.pullIndicator.classList.add('visible');
      state.pull.ready = delta > 82;
      els.pullIndicatorText.textContent = state.pull.ready ? 'Release to refresh' : 'Pull to refresh';
    }else{
      els.pullIndicator.classList.remove('visible');
    }
  }, { passive:true });
  window.addEventListener('touchend', () => {
    if(state.pull.ready){ refreshData(); }
    state.pull.engaged = false;
    state.pull.ready = false;
    if(!state.refreshing) els.pullIndicator.classList.remove('visible');
  }, { passive:true });
}
function flashPull(text){
  els.pullIndicatorText.textContent = text;
  els.pullIndicator.classList.add('visible');
  setTimeout(() => els.pullIndicator.classList.remove('visible'), 1300);
}

function init(){
  hydrateLocalState();
  bootstrapNav();
  setupInteractions();
  setupStaticButtons();
  if(localStorage.getItem(AUTH_KEY) === 'true'){
    showApp();
  }else{
    els.passwordInput.focus();
  }
}

init();
</script>
<script>
if('serviceWorker' in navigator){
  navigator.serviceWorker.getRegistrations().then(regs => regs.forEach(r => r.unregister()));
  caches.keys().then(keys => keys.forEach(k => caches.delete(k)));
}
</script>
