      address: form.querySelector('[name="address"]').value.trim(),
      licenseNumber: form.querySelector('[name="license"]').value.trim(),
      paymentTerms: form.querySelector('[name="terms"]').value.trim(),
      notes: form.querySelector('[name="notes"]').value.trim(),
      requestedBy: 'Staff App',
      requestedAt: new Date().toISOString()
    };
    if(!data.businessName){ alert('Business name is required'); return; }
    const requests = JSON.parse(localStorage.getItem('7c_customer_requests') || '[]');
    requests.unshift(data);
    localStorage.setItem('7c_customer_requests', JSON.stringify(requests));
    state.showCustomerRequestForm = false;
    state.lastCustTabRequest = data;
    renderCustomers();
  });
  const ccBtn = els.panels.customers.querySelector('#custCancelRequest');
  if(ccBtn) ccBtn.addEventListener('click', () => { state.showCustomerRequestForm = false; renderCustomers(); });
  els.panels.customers.querySelectorAll('[data-send-custtab-wa]').forEach(button => button.addEventListener('click', () => {
    if(state.lastCustTabRequest) sendToTallyn('whatsapp', formatCustomerRequestText(state.lastCustTabRequest));
  }));
  els.panels.customers.querySelectorAll('[data-send-custtab-email]').forEach(button => button.addEventListener('click', () => {
    if(state.lastCustTabRequest) sendToTallyn('email', formatCustomerRequestText(state.lastCustTabRequest));
  }));
  const dismissCustTab = els.panels.customers.querySelector('#dismissCustTabReq');
  if(dismissCustTab) dismissCustTab.addEventListener('click', () => { state.lastCustTabRequest = null; renderCustomers(); });

  // Customer notes event listeners
  els.panels.customers.querySelectorAll('[data-add-note]').forEach(btn => {
    btn.addEventListener('click', () => {
      const name = btn.dataset.addNote;
      state.noteFormOpen = state.noteFormOpen === name ? null : name;
      renderCustomers();
    });
  });
  els.panels.customers.querySelectorAll('[data-notes-show-all]').forEach(btn => {
    btn.addEventListener('click', () => {
      const name = btn.dataset.notesShowAll;
      state.notesExpanded[name] = !state.notesExpanded[name];
      renderCustomers();
    });
  });
  els.panels.customers.querySelectorAll('[data-note-chip]').forEach(chip => {
    chip.addEventListener('click', () => {
      const cardName = chip.closest('[data-note-card]').dataset.noteCard;
      const textarea = els.panels.customers.querySelector(`[data-note-textarea="${CSS.escape(cardName)}"]`);
      if(!textarea) return;
      const tag = chip.dataset.noteChip;
      textarea.value = textarea.value ? `[${tag}] ${textarea.value}` : `[${tag}] `;
      textarea.focus();
    });
  });
  els.panels.customers.querySelectorAll('[data-note-cancel]').forEach(btn => {
    btn.addEventListener('click', () => { state.noteFormOpen = null; renderCustomers(); });
  });
  els.panels.customers.querySelectorAll('[data-note-save]').forEach(btn => {
    btn.addEventListener('click', () => {
      const cardName = btn.dataset.noteSave;
      const textarea = els.panels.customers.querySelector(`[data-note-textarea="${CSS.escape(cardName)}"]`);
      if(!textarea) return;
      const text = textarea.value.trim();
      if(!text) return;
      let author = localStorage.getItem(RECEIPTS_USER_KEY) || '';
      if(!author){
        author = prompt('Enter your name for this note:')?.trim() || 'Staff';
        if(author && author !== 'Staff') localStorage.setItem(RECEIPTS_USER_KEY, author);
      }
      if(!state.customerNotes[cardName]) state.customerNotes[cardName] = [];
      state.customerNotes[cardName].unshift({ id: Date.now().toString(), text, author, createdAt: new Date().toISOString() });
      persistCustomerNotes();
      state.noteFormOpen = null;
      renderCustomers();
    });
  });
}

function renderTaskCards(items, columnKey){
  if(!items.length) return emptyState('🥂','No tasks here','Everything is clear in this lane.');
  return items.map(task => {
    const moveOptions = columnKey === 'todo'
      ? `<button class="btn btn-sm" data-move-task="${escapeHtml(task.title)}" data-to="In Progress">→ In Progress</button>`
      : columnKey === 'progress'
      ? `<button class="btn btn-sm" data-move-task="${escapeHtml(task.title)}" data-to="Done">✓ Done</button><button class="btn btn-sm btn-muted" data-move-task="${escapeHtml(task.title)}" data-to="To Do">← To Do</button>`
      : `<button class="btn btn-sm btn-muted" data-move-task="${escapeHtml(task.title)}" data-to="In Progress">← Reopen</button>`;
    return `
      <article class="kanban-task">
        <div style="display:flex;justify-content:space-between;gap:10px;align-items:flex-start;">
          <h4>${escapeHtml(task.title)}</h4>
          ${priorityBadge(task.priority)}
        </div>
        <p>${escapeHtml(task.description || 'No extra detail provided.')}</p>
        <div class="kanban-meta">
          <span class="badge blue">${escapeHtml(task.board || 'General')}</span>
          <span class="badge green">${escapeHtml(task.assignee || 'Unassigned')}</span>
          ${task.dueDate ? `<span class="badge yellow">Due ${escapeHtml(shortDate(task.dueDate))}</span>` : ''}
        </div>
        <div class="kanban-actions">${moveOptions}</div>
      </article>
    `;
  }).join('');
}

function renderTasks(){
  const assignees = [...new Set(state.data.tasks.map(t => t.assignee || 'Unassigned'))].sort();
  const af = state.taskAssigneeFilter;
  const filteredTasks = af ? state.data.tasks.filter(t => (t.assignee || 'Unassigned') === af) : state.data.tasks;
  const columns = [
    { key:'todo', title:'To Do', matcher: task => normalize(task.status) === 'todo' },
    { key:'progress', title:'In Progress', matcher: task => /progress|doing/.test(normalize(task.status)) },
    { key:'done', title:'Done', matcher: task => /done|complete/.test(normalize(task.status)) }
  ];
  const activeCol = state.activeTaskColumn || 'todo';
  const activeColumn = columns.find(c => c.key === activeCol) || columns[0];
  const activeItems = filteredTasks.filter(activeColumn.matcher);

  els.panels.tasks.innerHTML = `
    <div class="card">
      <div class="card-header">
        <div>
          <h3>Task Board</h3>
        </div>
        <span class="badge gold">${filteredTasks.length} tasks</span>
      </div>
      <div class="card-body">
        <div class="filter-pills" style="margin-bottom:14px">
          <button class="pill ${!af ? 'active' : ''}" type="button" data-assignee-filter="">Everyone</button>
          ${assignees.map(a => `<button class="pill ${af === a ? 'active' : ''}" type="button" data-assignee-filter="${escapeHtml(a)}">${escapeHtml(a)}</button>`).join('')}
        </div>
        <!-- Mobile: Trello-style tabs -->
        <div class="kanban-tabs">
          ${columns.map(column => {
            const count = filteredTasks.filter(column.matcher).length;
            return `<button class="kanban-tab ${column.key === activeCol ? 'active' : ''}" data-task-tab="${column.key}" type="button">${column.title}<span class="tab-count">${count}</span></button>`;
          }).join('')}
        </div>
        <div class="kanban-swipe">
          <div class="kanban-col">
            <div class="kanban-body">
              ${renderTaskCards(activeItems, activeCol)}
            </div>
          </div>
        </div>
        <!-- Desktop: 3-column kanban -->
        <div class="kanban">
          ${columns.map(column => {
            const items = filteredTasks.filter(column.matcher);
            return `
              <div class="kanban-col" data-column="${column.key}" data-collapsed="${state.taskSections[column.key] ? 'false' : 'true'}">
                <button class="kanban-toggle" type="button" data-toggle-column="${column.key}" aria-expanded="${state.taskSections[column.key] ? 'true' : 'false'}">
                  <div class="kanban-head">
                    <h3>${column.title}</h3>
                    <span class="kanban-count">${items.length}</span>
                  </div>
                </button>
                <div class="kanban-body">
                  ${renderTaskCards(items, column.key)}
                </div>
              </div>
            `;
          }).join('')}
        </div>
      </div>
    </div>
  `;
  // Assignee filter
  els.panels.tasks.querySelectorAll('[data-assignee-filter]').forEach(button => button.addEventListener('click', () => {
    state.taskAssigneeFilter = button.dataset.assigneeFilter;
    renderTasks();
  }));
  // Desktop: column toggle
  els.panels.tasks.querySelectorAll('[data-toggle-column]').forEach(button => button.addEventListener('click', () => {
    const key = button.dataset.toggleColumn;
    state.taskSections[key] = !state.taskSections[key];
    renderTasks();
  }));
  // Mobile: tab switching
  els.panels.tasks.querySelectorAll('[data-task-tab]').forEach(button => button.addEventListener('click', () => {
    state.activeTaskColumn = button.dataset.taskTab;
    renderTasks();
  }));
  // Move task buttons (both views)
  els.panels.tasks.querySelectorAll('[data-move-task]').forEach(button => button.addEventListener('click', () => {
    const title = button.dataset.moveTask;
    const toStatus = button.dataset.to;
    const task = state.data.tasks.find(t => t.title === title);
    if(task){
      task.status = toStatus;
      renderTasks();
    }
  }));
}

/* ── Image compression helper ──────────────────────────────── */
function compressImage(file, maxWidth){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = reject;
    reader.onload = event => {
      const img = new Image();
      img.onerror = reject;
      img.onload = () => {
        const ratio = Math.min(1, maxWidth / img.width);
        const canvas = document.createElement('canvas');
        canvas.width = Math.round(img.width * ratio);
        canvas.height = Math.round(img.height * ratio);
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        resolve(canvas.toDataURL('image/jpeg', 0.72));
      };
      img.src = event.target.result;
    };
    reader.readAsDataURL(file);
  });
}

/* ── Receipts Tab ───────────────────────────────────────────── */
function getReceiptMonths(){
  const months = new Set(state.receipts.map(r => r.date ? r.date.slice(0,7) : null).filter(Boolean));
  const now = new Date();
  for(let i = 0; i < 4; i++){
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    months.add(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`);
  }
  return [...months].sort().reverse();
}

function receiptMonthLabel(ym){
  if(!ym) return 'All';
  const [y, m] = ym.split('-');
  return new Intl.DateTimeFormat('en', { month:'long', year:'numeric' }).format(new Date(Number(y), Number(m)-1, 1));
}

function renderReceipts(){
  const todayStr = new Date().toISOString().slice(0,10);

  if(!state.receiptsMonth) state.receiptsMonth = months[0] || '';

    .filter(r => !state.receiptsMonth || (r.date && r.date.startsWith(state.receiptsMonth)))
    .sort((a,b) => (b.date||'').localeCompare(a.date||''));

  const monthTotal = filtered.reduce((s,r) => s + Number(r.amount||0), 0);
  const catMap = {};
  filtered.forEach(r => { catMap[r.category] = (catMap[r.category]||0) + Number(r.amount||0); });
  const topCats = Object.entries(catMap).sort((a,b)=>b[1]-a[1]).slice(0,3);

  const summaryHtml = filtered.length ? `
    <div class="receipt-summary-strip">
      <div>
        <div class="rs-label">Total Spend</div>
        <div class="rs-total">${state.receipts.find(r=>r.currency==='USD'&&filtered.includes(r)) ? '' : 'KYD '}${monthTotal.toFixed(2)}</div>
        <div style="color:var(--text-soft);font-size:12px;margin-top:4px">${filtered.length} receipt${filtered.length!==1?'s':''}</div>
      </div>
      <div>
        <div class="rs-label">Top Categories</div>
        <div class="rs-cats">
          ${topCats.map(([cat,amt])=>`<span class="badge gold">${escapeHtml(cat)}: ${amt.toFixed(2)}</span>`).join('')}
        </div>
      </div>
    </div>` : '';

  const receiptCardsHtml = filtered.length ? filtered.map(r => {
    const isExpanded = state.receiptExpanded === r.id;

    const thumbHtml = r.imageData
      ? `<img class="receipt-thumb" src="${r.imageData}" alt="receipt">`
      : `<div class="receipt-thumb-placeholder">🧾</div>`;
    const expandHtml = isExpanded ? `
      <div class="receipt-expand open">
        ${r.imageData ? `<img class="receipt-expand-img" src="${r.imageData}" alt="full receipt">` : ''}
        <div class="receipt-expand-grid">
          <div class="receipt-expand-field"><span class="ef-label">Vendor</span><span class="ef-val">${escapeHtml(r.vendor||'—')}</span></div>
          <div class="receipt-expand-field"><span class="ef-label">Amount</span><span class="ef-val">${escapeHtml(r.currency||'KYD')} ${Number(r.amount||0).toFixed(2)}</span></div>
          <div class="receipt-expand-field"><span class="ef-label">Category</span><span class="ef-val">${escapeHtml(r.category||'—')}</span></div>
          <div class="receipt-expand-field"><span class="ef-label">Date</span><span class="ef-val">${escapeHtml(shortDate(r.date))}</span></div>
          <div class="receipt-expand-field"><span class="ef-label">Submitted By</span><span class="ef-val">${escapeHtml(r.submittedBy||'—')}</span></div>
          <div class="receipt-expand-field"><span class="ef-label">Status</span><span class="ef-val"><span class="badge ${statusCls}">${escapeHtml(r.status||'pending')}</span></span></div>
          ${r.notes ? `<div class="receipt-expand-field" style="grid-column:1/-1"><span class="ef-label">Notes</span><span class="ef-val">${escapeHtml(r.notes)}</span></div>` : ''}
        </div>
        <button class="btn btn-danger" style="width:100%" type="button" data-delete-receipt="${r.id}">🗑 Delete Receipt</button>
      </div>` : `<div class="receipt-expand"></div>`;
    return `
      <div class="receipt-card" data-receipt-id="${r.id}">
        <div class="receipt-card-row">
          ${thumbHtml}
          <div class="receipt-card-info">
            <div class="receipt-card-title">${escapeHtml(r.vendor||'Unknown Vendor')}</div>
            <div class="receipt-card-meta">${escapeHtml(r.category||'')} · ${escapeHtml(shortDate(r.date))} · ${escapeHtml(r.submittedBy||'')}</div>
          </div>
          <div class="receipt-card-right">
            <span class="receipt-amount">${escapeHtml(r.currency||'KYD')} ${Number(r.amount||0).toFixed(2)}</span>
            <span class="badge ${statusCls}">${escapeHtml(r.status||'pending')}</span>
          </div>
        </div>
        ${expandHtml}
      </div>`;
  }).join('') : emptyState('🧾','No receipts this month','Snap a receipt using the form above to get started.');

    <div class="card receipt-capture-card">
      <div class="card-header">
        <div><h3>📷 Add Receipt</h3></div>
      </div>
      <div class="card-body">

            <label for="receiptVendor">Vendor / Merchant</label>

          </div>
          <div class="rfield">
            <label for="receiptAmount">Amount</label>
            <input type="number" id="receiptAmount" step="0.01" min="0" placeholder="0.00">
          </div>
          <div class="rfield">
            <label>Currency</label>
            <div class="currency-toggle">
              <button class="currency-btn active" type="button" data-currency="KYD">KYD</button>
              <button class="currency-btn" type="button" data-currency="USD">USD</button>
            </div>
          </div>
          <div class="rfield full">
            <label for="receiptCategory">Category</label>
            <select id="receiptCategory">
              <option value="Supplies">Supplies</option>
              <option value="Shipping/Freight">Shipping / Freight</option>
              <option value="Food &amp; Beverage">Food &amp; Beverage</option>
              <option value="Utilities">Utilities</option>
              <option value="Customs/Duty">Customs / Duty</option>
              <option value="Vehicle/Gas">Vehicle / Gas</option>
              <option value="Office">Office</option>
              <option value="Marketing">Marketing</option>
              <option value="Other">Other</option>
            </select>
          </div>
          <div class="rfield full">
            <label for="receiptNotes">Notes (optional)</label>
            <textarea id="receiptNotes" placeholder="Additional details..."></textarea>
          </div>
          <div class="rfield full">
            <label for="receiptSubmittedBy">Submitted By</label>
            <input type="text" id="receiptSubmittedBy" placeholder="Your name" value="${escapeHtml(savedUser)}">
          </div>
        </div>
        <button class="btn btn-gold" style="width:100%;margin-top:6px" type="button" id="receiptSaveBtn">💾 Save Receipt</button>
        <div id="receiptSaveMsg" style="display:none;margin-top:10px;padding:10px 14px;border-radius:12px;background:rgba(76,195,138,.12);border:1px solid rgba(76,195,138,.2);color:#8fe2b5;font-weight:600;text-align:center"></div>

    });
  });

  // Image file handler
  const fileInput = document.getElementById('receiptFileInput');
  const preview = document.getElementById('receiptPreview');
  const btnText = document.getElementById('receiptImgBtnText');
  fileInput.addEventListener('change', async () => {
    const file = fileInput.files[0];
    if(!file) return;
    try{
      const compressed = await compressImage(file, 800);
      state.receiptImagePreview = compressed;
      preview.src = compressed;
      preview.classList.add('visible');
      btnText.textContent = '✅ Image selected — tap to change';

      state.receiptImagePreview = null;

  // Month filter pills
  els.panels.receipts.querySelectorAll('[data-receipt-month]').forEach(btn => {
    btn.addEventListener('click', () => {

      renderReceipts();
    });
  });

  // Receipt card expand/collapse
  els.panels.receipts.querySelectorAll('.receipt-card').forEach(card => {
    const row = card.querySelector('.receipt-card-row');
    row.addEventListener('click', () => {
      const id = card.dataset.receiptId;
      state.receiptExpanded = state.receiptExpanded === id ? null : id;
      renderReceipts();
    });
  });

  // Delete receipt
  els.panels.receipts.querySelectorAll('[data-delete-receipt]').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const id = btn.dataset.deleteReceipt;
      state.receipts = state.receipts.filter(r => r.id !== id);
      state.receiptExpanded = null;
      persistReceipts();
      renderReceipts();
    });
  });

  // Save receipt
  document.getElementById('receiptSaveBtn').addEventListener('click', async () => {
    const vendor = document.getElementById('receiptVendor').value.trim();
    const amount = document.getElementById('receiptAmount').value;
    const date = document.getElementById('receiptDate').value || todayStr;
    const category = document.getElementById('receiptCategory').value;
    const notes = document.getElementById('receiptNotes').value.trim();
    const submittedBy = document.getElementById('receiptSubmittedBy').value.trim();
    if(!vendor){ document.getElementById('receiptVendor').focus(); return; }
    if(!amount){ document.getElementById('receiptAmount').focus(); return; }
    if(submittedBy) localStorage.setItem(RECEIPTS_USER_KEY, submittedBy);
    const receipt = {
      id: Date.now().toString(36) + Math.random().toString(36).slice(2,6),
      date,
      vendor,
      amount: parseFloat(amount) || 0,
      currency: selectedCurrency,
      category,
      notes,
      submittedBy,
      imageData: state.receiptImagePreview || null,
      createdAt: new Date().toISOString(),
      status: 'pending'
    };
    state.receipts.unshift(receipt);
    persistReceipts();
    state.receiptImagePreview = null;
    // Show success
    const msg = document.getElementById('receiptSaveMsg');
    msg.textContent = '✅ Receipt saved!';
    msg.style.display = 'block';
    setTimeout(() => renderReceipts(), 1200);
  });
}

function emptyState(emoji, title, body){
  return `<div class="empty-state"><div class="emoji">${emoji}</div><h4>${escapeHtml(title)}</h4><p>${escapeHtml(body)}</p></div>`;
}
function capitalize(value){ return value ? value.charAt(0).toUpperCase() + value.slice(1) : ''; }
function priorityBadge(priority){
  const level = normalize(priority || 'medium');
  const cls = level === 'high' ? 'red' : level === 'low' ? 'green' : 'yellow';
  return `<span class="badge ${cls}">${escapeHtml(level || 'medium')}</span>`;
}
function statusBadge(status){
  const value = normalize(status || 'pending');
  const cls = /complete|fulfilled|paid/.test(value) ? 'green' : /cancel/.test(value) ? 'red' : /order/.test(value) ? 'gold' : 'blue';
  return `<span class="badge ${cls}">${escapeHtml(status || 'Pending')}</span>`;
}

function setOutForDelivery(orderId){
  const order = state.pendingOrders.find(o => o.id === orderId);
  if(!order) return;
  order.status = 'OUT_FOR_DELIVERY';
  order.outForDeliveryAt = new Date().toISOString();
  persistPendingOrders();
  sheetsSync.updateStatus(order.id, 'OUT_FOR_DELIVERY', null, null); // sync status
  renderOrders();
}

function showSignatureLightbox(orderId){
    const order = state.pendingOrders.find(o => o.id === orderId);
    if (!order || !order.signature) return;
    const container = document.getElementById('signatureLightboxContainer');
    container.innerHTML = `
        <div class="signature-lightbox" id="signatureLightbox">
            <div style="text-align:center">
                <img src="${order.signature}" alt="Delivery signature for ${escapeHtml(order.customer)}">
                ${order.signedBy && order.signedBy !== 'Customer' ? `<p style="color:#fff;margin-top:10px;font-size:13px;opacity:.8">Signed by: <strong>${escapeHtml(order.signedBy)}</strong></p>` : ''}
            </div>
        </div>
    `;
    container.querySelector('#signatureLightbox').addEventListener('click', () => {
        container.innerHTML = '';
    });
}

function showSignatureModal(orderId) {
    const order = state.pendingOrders.find(o => o.id === orderId);
    if (!order) return;

    const container = document.getElementById('signatureModalContainer');
    const itemsSummary = order.lines.map(l => `${l.quantity}× ${l.title}`).join(', ');

    container.innerHTML = `
        <div class="signature-modal-overlay" id="signatureOverlay">
            <div class="signature-modal">
                <div class="sig-header">
                    <div>
                        <h3>Delivery Signature</h3>
                        <p>${escapeHtml(order.customer)} - ${currency(order.total)}</p>
                    </div>
                    <button class="pm-close" id="sigCloseBtn" type="button">✕</button>
                </div>
                <div class="sig-body">
                    <div class="sig-order-summary">${itemsSummary}</div>
                    <div class="sig-canvas-wrap">
                        <canvas id="signatureCanvas" class="signature-canvas"></canvas>
                    </div>
                    <div style="margin-top:12px">
                        <label style="display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px">Recipient Name (printed)</label>
                        <input id="sigRecipientName" type="text" placeholder="Full name of person receiving delivery" style="width:100%;padding:10px 12px;border-radius:10px;border:1px solid rgba(255,255,255,.12);background:var(--surface-2);color:var(--text1);font-size:14px;box-sizing:border-box">
                    </div>
                    <div class="sig-actions">
                        <button class="btn btn-ghost" id="sigClearBtn" type="button">Clear</button>
                        <button class="btn btn-gold" id="sigConfirmBtn" type="button" disabled>✅ Confirm Delivery</button>
                    </div>
                </div>
            </div>
        </div>
    `;

    const overlay = document.getElementById('signatureOverlay');
    const canvas = document.getElementById('signatureCanvas');
    const confirmBtn = document.getElementById('sigConfirmBtn');
    const ctx = canvas.getContext('2d');
    let drawing = false;
    let hasDrawn = false;

    function resizeCanvas() {
        const ratio = Math.max(window.devicePixelRatio || 1, 1);
        canvas.width = canvas.offsetWidth * ratio;
        canvas.height = canvas.offsetHeight * ratio;
        ctx.scale(ratio, ratio);
        ctx.strokeStyle = '#1A1A1A';
        ctx.lineWidth = 2.5;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
    }

    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    function getPos(e) {
        const rect = canvas.getBoundingClientRect();
        const touch = e.touches ? e.touches[0] : e;
        return {
            x: touch.clientX - rect.left,
            y: touch.clientY - rect.top
        };
    }

    function startDrawing(e) {
        e.preventDefault();
        drawing = true;
        const { x, y } = getPos(e);
        ctx.beginPath();
        ctx.moveTo(x, y);
    }

    function draw(e) {
        if (!drawing) return;
        e.preventDefault();
        const { x, y } = getPos(e);
        ctx.lineTo(x, y);
        ctx.stroke();
        if (!hasDrawn) {
            hasDrawn = true;
            confirmBtn.disabled = false;
        }
    }

    function stopDrawing() {
        if (!drawing) return;
        drawing = false;
        ctx.closePath();
    }

    canvas.addEventListener('mousedown', startDrawing);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseup', stopDrawing);
    canvas.addEventListener('mouseout', stopDrawing);

    canvas.addEventListener('touchstart', startDrawing, { passive: false });
    canvas.addEventListener('touchmove', draw, { passive: false });
    canvas.addEventListener('touchend', stopDrawing);

    document.getElementById('sigClearBtn').addEventListener('click', () => {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        hasDrawn = false;
        confirmBtn.disabled = true;
    });

    document.getElementById('sigConfirmBtn').addEventListener('click', () => {
        if (!hasDrawn) return;
        order.status = 'DELIVERED';
        order.deliveredAt = new Date().toISOString();
        order.signature = canvas.toDataURL('image/png');
        const nameInput = document.getElementById('sigRecipientName');
        order.signedBy = (nameInput && nameInput.value.trim()) ? nameInput.value.trim() : 'Customer';
        persistPendingOrders();
        sheetsSync.updateStatus(order.id, 'DELIVERED', order.deliveredAt, order.signedBy); // sync delivery
        closeModal();
        renderOrders();
    });
    
    function closeModal() {
        window.removeEventListener('resize', resizeCanvas);
        overlay.remove();
    }

    document.getElementById('sigCloseBtn').addEventListener('click', closeModal);
    overlay.addEventListener('click', (e) => {
        if (e.target === overlay) closeModal();
    });
}


function bindGlobalPanelActions(root){
  root.querySelectorAll('[data-open-sale]').forEach(button => button.addEventListener('click', startFreshSale));
  root.querySelectorAll('[data-go-tab]').forEach(button => button.addEventListener('click', () => setActiveTab(button.dataset.goTab)));
}

async function tryLogin(){
  const value = els.passwordInput.value;
  const hashed = await sha256(value);
  if(hashed === PASSWORD_HASH){
    localStorage.setItem(AUTH_KEY, 'true');
    els.loginError.style.display = 'none';
    showApp();
    return;
  }
  els.loginError.style.display = 'block';
}
function showApp(){
  els.loginScreen.classList.add('hidden');
  els.appShell.classList.remove('hidden');
  if(!state.data.products.length) loadData().catch(handleLoadError);
  // Auto-poll Cin7 every 30s for order status changes (Tallyn approvals)
  if(!window._cin7PollTimer){
    window._cin7PollTimer = setInterval(async () => {
      if(state.pendingOrders.some(o => o.cin7SaleId && o.status === 'PENDING')){
        await syncCin7OrderStatuses();
      }
    }, 30000);
  }
}
function logout(){
  localStorage.removeItem(AUTH_KEY);
  els.appShell.classList.add('hidden');
  els.loginScreen.classList.remove('hidden');
  els.passwordInput.value = '';
}

async function refreshData(){
  if(state.refreshing) return;
  state.refreshing = true;
  flashPull('Reloading…');
  location.reload();
}
function handleLoadError(error){
  console.error(error);
  Object.values(els.panels).forEach(panel => panel.innerHTML = emptyState('🍷','Unable to load dashboard data','Check the local data files and refresh the page.'));
}

function setupInteractions(){
  els.loginButton.addEventListener('click', tryLogin);
  els.passwordInput.addEventListener('keydown', event => { if(event.key === 'Enter') tryLogin(); });
  document.querySelectorAll('[data-open-sale]').forEach(button => button.addEventListener('click', startFreshSale));
  setupPullToRefresh();
  // Mobile sale bar buttons
  const saleBarSubmit = document.getElementById('saleBarSubmit');
  const saleBarQuote = document.getElementById('saleBarQuote');
  if(saleBarSubmit) saleBarSubmit.addEventListener('click', () => { submitDraftOrder(); window.scrollTo({top:0,behavior:'smooth'}); });
  if(saleBarQuote) saleBarQuote.addEventListener('click', () => { initSendQuote(); window.scrollTo({top:0,behavior:'smooth'}); });
  window.addEventListener('resize', updateMobileSaleBar);
}

function setupStaticButtons(){
  document.querySelectorAll('[data-open-sale]').forEach(button => button.addEventListener('click', startFreshSale));
}

function getScrollTop(){ return Math.max(0, window.scrollY || window.pageYOffset || document.documentElement.scrollTop || 0); }
function setupPullToRefresh(){
  let lastY = 0;
  window.addEventListener('touchstart', event => {
    if(getScrollTop() > 5) return;
    state.pull.startY = event.touches[0].clientY;
    state.pull.engaged = true;
    state.pull.ready = false;
  }, { passive:true });
  window.addEventListener('touchmove', event => {
    if(!state.pull.engaged || state.refreshing) return;
    lastY = event.touches[0].clientY;
    const delta = lastY - state.pull.startY;
    if(delta > 12 && getScrollTop() <= 5){
      els.pullIndicator.classList.add('visible');
      state.pull.ready = delta > 82;
      els.pullIndicatorText.textContent = state.pull.ready ? 'Release to refresh' : 'Pull to refresh';
    }else{
      els.pullIndicator.classList.remove('visible');
    }
  }, { passive:true });
  window.addEventListener('touchend', () => {
    if(state.pull.ready){ refreshData(); }
    state.pull.engaged = false;
    state.pull.ready = false;
    if(!state.refreshing) els.pullIndicator.classList.remove('visible');
  }, { passive:true });
}
function flashPull(text){
  els.pullIndicatorText.textContent = text;
  els.pullIndicator.classList.add('visible');
  setTimeout(() => els.pullIndicator.classList.remove('visible'), 1300);
}

function init(){
  hydrateLocalState();
  bootstrapNav();
  setupInteractions();
  setupStaticButtons();
  if(localStorage.getItem(AUTH_KEY) === 'true'){
    showApp();
  }else{
    els.passwordInput.focus();
  }
}

init();
</script>

if('serviceWorker' in navigator){
  navigator.serviceWorker.getRegistrations().then(regs => regs.forEach(r => r.unregister()));
  caches.keys().then(keys => keys.forEach(k => caches.delete(k)));
}
</script>
